<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Manual Definitivo — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f5;
  --card:#ffffff;
  --border:#ebe5dc;
  --border-h:#d8cfc3;
  --sidebar:#1c1410;
  --text:#1c1410;
  --muted:#7a6c5e;
  --hint:#a0917e;
  --accent:#e8621a;
  --accent-bg:rgba(232,98,26,0.08);
  --green:#1a7a4a;
  --amber:#c07800;
  --red:#b91c1c;
  --chart-a:#2d7d9a;
  --chart-b:#a06000;
  --grid:rgba(235,229,220,0.7);
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

/* ── Layout ── */
.layout{display:flex;min-height:100vh}

/* ── Sidebar ── */
.sidebar{width:200px;background:var(--sidebar);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;flex-shrink:0}
.sidebar-logo{padding:18px 16px 14px;font-size:10px;font-weight:700;color:#4a3828;text-transform:uppercase;letter-spacing:.12em;border-bottom:1px solid #2a1e14}
.nav-item{display:flex;align-items:center;padding:11px 16px;font-size:12px;color:#5a4838;cursor:pointer;transition:color .15s;border-left:3px solid transparent;text-decoration:none;gap:8px}
.nav-item:hover{color:#8a7060}
.nav-item.active{color:var(--accent);background:var(--accent-bg);border-left-color:var(--accent);font-weight:600}
.nav-item.disabled{opacity:.4;pointer-events:none}
.nav-soon{font-size:9px;background:rgba(90,72,56,.4);color:#8a7060;padding:1px 5px;border-radius:3px;margin-left:auto}

/* ── Main ── */
.main{margin-left:200px;flex:1;padding:24px 28px;min-width:0}

/* ── Header ── */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.hdr-title{font-size:15px;font-weight:500;color:var(--text);line-height:1.4}
.hdr-sub{margin-top:4px;font-size:11px;color:var(--hint);font-family:'DM Mono',monospace}
.btn-refresh{background:var(--card);border:0.5px solid var(--border-h);color:var(--muted);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;font-weight:400;transition:all .15s;white-space:nowrap}
.btn-refresh:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-refresh:disabled{opacity:.4;cursor:not-allowed}

/* ── Error ── */
.err{background:rgba(185,28,28,.06);border:0.5px solid rgba(185,28,28,.25);border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:#b91c1c;line-height:1.5}

/* ── file:// warning ── */
.file-warn{background:var(--card);border:0.5px solid #d8cfc3;border-radius:12px;padding:32px 36px;max-width:520px;margin:60px auto}
.file-warn h2{font-size:15px;font-weight:600;color:var(--text);margin-bottom:10px}
.file-warn p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px}
.file-warn code{background:#f3f1ed;border:0.5px solid var(--border);border-radius:6px;padding:10px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);display:block;margin:8px 0 14px}
.file-warn .step{display:flex;gap:12px;margin-bottom:10px;align-items:flex-start;font-size:13px;color:var(--text)}
.file-warn .sn{width:22px;height:22px;border-radius:50%;background:var(--accent-bg);border:0.5px solid var(--accent);color:var(--accent);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* ── Period ── */
.period-wrap{margin-bottom:20px}
.period-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.period-lbl{font-size:10px;color:var(--text);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.drbox{display:flex;align-items:center;background:var(--card);border:0.5px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .15s}
.drbox:focus-within{border-color:var(--accent)}
.drbox-icon{padding:7px 6px 7px 11px;color:var(--hint);font-size:13px;user-select:none}
.drbox input[type=date]{background:transparent;border:none;outline:none;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;padding:7px 10px 7px 4px;cursor:pointer;color-scheme:light;width:116px}
.drbox-sep{color:var(--hint);font-size:13px;padding:0 4px;user-select:none}
.period-quick{display:flex;gap:5px;flex-wrap:wrap}
.btn-q{background:transparent;border:0.5px solid var(--border-h);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'Inter',sans-serif;font-weight:400;transition:all .12s;white-space:nowrap}
.btn-q:hover{border-color:var(--accent);color:var(--accent)}
.btn-q.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:600}

/* ── KPIs ── */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.kc{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:16px 18px;transition:border-color .2s}
.kc:hover{border-color:var(--border-h)}
.kc-lbl{font-size:9px;color:var(--text);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-weight:700}
.kc-val{font-family:'Inter',sans-serif;font-weight:400;letter-spacing:-.03em;font-size:22px;line-height:1.1}
.kc-sub{font-size:10px;color:var(--hint);margin-top:5px;font-family:'DM Mono',monospace}

/* ── Status legend ── */
.status-legend{display:flex;gap:16px;margin-bottom:14px}
.sl{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--hint)}
.sl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Charts ── */
.cc{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:16px 18px 12px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ct{font-size:10px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.07em}
.lg{display:flex;gap:12px}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text)}
.ll{width:14px;height:2px;border-radius:2px}
.ld{width:7px;height:7px;border-radius:50%}
.charts-2x2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}

/* ── Tooltip ── */
.tip{background:var(--card);border:0.5px solid var(--border-h);border-radius:8px;padding:10px 13px;font-size:12px;box-shadow:0 4px 16px rgba(28,20,16,.12);display:none;position:absolute;pointer-events:none;z-index:20;min-width:150px}
.tl{color:var(--hint);margin-bottom:5px;font-weight:500;font-size:10px;font-family:'DM Mono',monospace}
.tr{display:flex;justify-content:space-between;gap:14px;margin-bottom:2px;font-size:11px}
.tv{color:var(--text);font-weight:500}

/* ── Spinner ── */
.sw{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px}
.sp{width:32px;height:32px;border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.st{color:var(--hint);font-size:13px}

.foot{margin-top:18px;font-size:10px;color:var(--border-h);text-align:center;font-family:'DM Mono',monospace}
canvas{display:block}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.5;cursor:pointer}
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-logo">Dashboard</div>
    <a class="nav-item active">📊 Principal</a>
    <a class="nav-item disabled">📈 Métricas tráfego <span class="nav-soon">em breve</span></a>
    <a class="nav-item disabled">🎯 Anúncios <span class="nav-soon">em breve</span></a>
    <a class="nav-item disabled">🏠 Métricas produtos <span class="nav-soon">em breve</span></a>
  </nav>
  <div class="main">
    <div class="sw" id="loading"><div class="sp"></div><p class="st">Carregando dados...</p></div>
    <div id="main-content" style="display:none"></div>
  </div>
</div>

<script>
const IS_FILE = location.protocol === "file:";
const SHEET_ID = "1WnzVmGkeT-s9RW3Kop1MdY8NmkNoGNk7CDDa9YvYw90";
const API_KEY  = "AIzaSyDxMp-u0RUfy-Xv0jICULZbJGpuAUxqQPI";
const URL_META   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent("Ⓜ️ Base Meta")}?key=${API_KEY}`;
const URL_VENDAS = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent("📥 Base Vendas")}?key=${API_KEY}`;

const META_CPV    = 10;
const META_ROAS   = 1.80;
const META_TICKET = 18;
const TAXA_IMPOSTO  = 1.1215; // 12,15% imposto Meta

const S = {
  meta:{}, vendas:{},
  loading:false, error:null, updated:null, firstLoad:true,
  ultimaVenda:null,
  startDate: nDaysAgoISO(29), endDate: todayISO(), activeQuick:"30d",
};

// ── Date helpers ────────────────────────────────────────────────────────────
function todayISO(){ return new Date().toISOString().split("T")[0] }
function yesterdayISO(){ const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split("T")[0] }
function nDaysAgoISO(n){ const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split("T")[0] }
function firstOfMonthISO(){ const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01` }

// ── Parse helpers ────────────────────────────────────────────────────────────
function parseBRL(s){ if(!s||s==="-"||s==="0")return 0; return parseFloat(String(s).replace(/R\$\s*/g,"").replace(/\./g,"").replace(",",".").trim())||0 }
function toISO(s){ if(!s||s==="Date"||s==="")return null; s=String(s).trim(); if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s; const p=s.split("/"); if(p.length===3){const y=p[2].length===4?p[2]:"20"+p[2];return `${y}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`} return null }
function fBRL(n){ return "R$ "+(n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}) }
function fBRLShort(n){ const a=Math.abs(n||0),sg=n<0?"-":""; if(a>=1000)return sg+"R$"+(a/1000).toFixed(1)+"k"; return sg+"R$"+Math.round(a) }
function fDate(iso){ if(!iso)return"";const[,m,d]=iso.split("-");return `${d}/${m}` }
function parseSheet(json){ const rows=json.values||[]; if(rows.length<2)return[]; const h=rows[0]; return rows.slice(1).map(r=>Object.fromEntries(h.map((k,i)=>[k,(r[i]||"").trim()]))) }

// ── Status color: verde / âmbar / vermelho ───────────────────────────────────
// higherIsBetter=true → acima da meta é bom (ROAS, ticket)
// higherIsBetter=false → abaixo da meta é bom (CPV)
function statusColor(val, meta, higherIsBetter){
  if(!val || val === 0) return "#1c1410";
  const ratio = val / meta;
  if(higherIsBetter){
    if(ratio >= 1)    return "#1a7a4a"; // verde — dentro
    if(ratio >= 0.9)  return "#c07800"; // âmbar — até 10% fora
    return "#b91c1c";                    // vermelho — mais de 10% fora
  } else {
    if(ratio <= 1)    return "#1a7a4a";
    if(ratio <= 1.1)  return "#c07800";
    return "#b91c1c";
  }
}

// ── Load data ────────────────────────────────────────────────────────────────
async function loadData(){
  if(IS_FILE){ S.firstLoad=false; render(); return; }
  S.loading=true; S.error=null;
  if(!S.firstLoad) render();
  try {
    const [mr,vr] = await Promise.all([fetch(URL_META), fetch(URL_VENDAS)]);
    if(!mr.ok) throw new Error(`HTTP ${mr.status} ao carregar Meta`);
    if(!vr.ok) throw new Error(`HTTP ${vr.status} ao carregar Vendas`);
    const [mj,vj] = await Promise.all([mr.json(), vr.json()]);

    const mD={};
    for(const r of parseSheet(mj)){
      const d=toISO(r["Date"]); if(!d) continue;
      if(!mD[d]) mD[d]={spend:0,clicks:0,impressions:0};
      mD[d].spend       += parseBRL(r["Spend (Cost, Amount Spent)"]);
      mD[d].clicks      += parseInt(r["Action Link Clicks"]||0)||0;
      mD[d].impressions += parseInt(r["Impressions"]||0)||0;
    }
    S.meta = mD;

    const vRows = parseSheet(vj);
    const vD={};
    let ultimaData = null;
    for(const r of vRows){
      const d=toISO(r["Data correta"]); if(!d) continue;
      if(!vD[d]) vD[d]={qtd:0,valor:0,taxaTotal:0};
      vD[d].qtd        += 1;
      // Valor do produto já inclui a taxa da plataforma (conforme instrução)
      const valor = parseBRL(r["Valor do produto"]);
      vD[d].valor      += valor;
      ultimaData = d;
    }
    S.vendas = vD;

    if(ultimaData){
      const [y,m,dd] = ultimaData.split("-");
      S.ultimaVenda = `${dd}/${m}/${y}`;
    }

    S.updated = new Date().toLocaleTimeString("pt-BR");
    S.firstLoad = false;
  } catch(e){
    S.error = e.message;
    S.firstLoad = false;
  }
  S.loading = false;
  render();
}

// ── Derived ──────────────────────────────────────────────────────────────────
function getDaily(){
  const all = new Set([...Object.keys(S.meta),...Object.keys(S.vendas)]);
  return Array.from(all).sort().filter(d=>d>=S.startDate&&d<=S.endDate).map(date=>{
    const m = S.meta[date]  || {spend:0,clicks:0,impressions:0};
    const v = S.vendas[date] || {qtd:0,valor:0};
    const custoReal = m.spend * TAXA_IMPOSTO;
    // Faturamento já é líquido de taxa da plataforma (está na planilha)
    const lucro = v.valor - custoReal;
    return {
      date, label:fDate(date),
      spend:m.spend, faturamento:v.valor, vendas:v.qtd,
      roas:   m.spend>0 ? v.valor/m.spend : 0,
      cpv:    v.qtd>0   ? m.spend/v.qtd   : 0,
      ticket: v.qtd>0   ? v.valor/v.qtd   : 0,
      lucro,
    };
  });
}

function getTotals(daily){
  const t = daily.reduce((a,d)=>({
    spend:a.spend+d.spend, fat:a.fat+d.faturamento, vendas:a.vendas+d.vendas
  }),{spend:0,fat:0,vendas:0});
  const custoReal = t.spend * TAXA_IMPOSTO;
  return {
    ...t,
    faturamento: t.fat,
    roas:   t.spend>0   ? t.fat/t.spend    : 0,
    cpv:    t.vendas>0  ? t.spend/t.vendas : 0,
    ticket: t.vendas>0  ? t.fat/t.vendas   : 0,
    lucro:  t.fat - custoReal,
  };
}

// ── Period controls ──────────────────────────────────────────────────────────
function applyQuick(k){
  S.activeQuick=k; const t=todayISO();
  ({hoje:()=>{S.startDate=t;S.endDate=t},
    ontem:()=>{const y=yesterdayISO();S.startDate=y;S.endDate=y},
    "7d":()=>{S.startDate=nDaysAgoISO(6);S.endDate=t},
    "30d":()=>{S.startDate=nDaysAgoISO(29);S.endDate=t},
    mes:()=>{S.startDate=firstOfMonthISO();S.endDate=t}
  })[k]?.();
  render();
}
function onDC(w,v){ if(w==="s")S.startDate=v; else S.endDate=v; S.activeQuick=""; render(); }

// ── Canvas charts (dual-axis e simples) ──────────────────────────────────────
const DPR = window.devicePixelRatio||1;

function drawDual(id, data, cssW, cssH){
  const c=document.getElementById(id); if(!c) return;
  c.width=Math.round(cssW*DPR); c.height=Math.round(cssH*DPR);
  c.style.width=cssW+"px"; c.style.height=cssH+"px";
  const ctx=c.getContext("2d"); ctx.scale(DPR,DPR);
  const P={t:14,r:52,b:28,l:58};
  const cW=cssW-P.l-P.r, cH=cssH-P.t-P.b;

  const lVals = data.map(d=>d.spend||0);
  const rVals = data.map(d=>d.cpv||0);
  const lMax  = Math.max(...lVals,0.01)*1.15;
  const rMax  = Math.max(...rVals, META_CPV,0.01)*1.4;
  const lMin=0, rMin=0;

  const xP = i => P.l + (data.length>1 ? i/(data.length-1) : 0.5)*cW;
  const yPL = v => P.t + cH - ((v-lMin)/(lMax-lMin))*cH;
  const yPR = v => P.t + cH - ((v-rMin)/(rMax-rMin))*cH;

  const GRID = "rgba(235,229,220,0.8)";
  const TICK = "#a0917e";
  const TF   = "10px 'DM Mono',monospace";

  // Grid + Y esquerda
  ctx.setLineDash([]);
  for(let i=0;i<=4;i++){
    const y = P.t + (i/4)*cH;
    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(P.l,y); ctx.lineTo(P.l+cW,y); ctx.stroke();
    const lv = lMax-(i/4)*(lMax-lMin);
    ctx.fillStyle=TICK; ctx.font=TF; ctx.textAlign="right";
    ctx.fillText(fBRLShort(lv), P.l-5, y+3.5);
    // Y direita
    const rv = rMax-(i/4)*(rMax-rMin);
    ctx.textAlign="left";
    ctx.fillText("R$"+rv.toFixed(0), P.l+cW+5, y+3.5);
  }

  // Meta CPV linha pontilhada
  const mY = yPR(META_CPV);
  ctx.strokeStyle="#a0600055"; ctx.lineWidth=1; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(P.l,mY); ctx.lineTo(P.l+cW,mY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle="#a06000"; ctx.font="9px 'Inter',sans-serif"; ctx.textAlign="left";
  ctx.fillText("Meta R$10", P.l+cW+5, mY-3);

  function drawLine(vals, color, yFn, fill){
    if(data.length<2) return;
    if(fill){
      ctx.beginPath();
      ctx.moveTo(xP(0),yFn(vals[0]));
      for(let i=1;i<data.length;i++) ctx.lineTo(xP(i),yFn(vals[i]));
      ctx.lineTo(xP(data.length-1), P.t+cH);
      ctx.lineTo(xP(0), P.t+cH);
      ctx.closePath();
      const g=ctx.createLinearGradient(0,P.t,0,P.t+cH);
      g.addColorStop(0,color+"28"); g.addColorStop(1,color+"00");
      ctx.fillStyle=g; ctx.fill();
    }
    ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.setLineDash([]);
    ctx.moveTo(xP(0),yFn(vals[0]));
    for(let i=1;i<data.length;i++) ctx.lineTo(xP(i),yFn(vals[i]));
    ctx.stroke();
  }

  drawLine(lVals, "#2d7d9a", yPL, true);
  drawLine(rVals, "#a06000", yPR, false);

  // X labels
  const step = data.length>60?7:data.length>30?3:data.length>14?2:1;
  ctx.fillStyle=TICK; ctx.font=TF; ctx.textAlign="center"; ctx.setLineDash([]);
  data.forEach((d,i)=>{ if(i%step===0) ctx.fillText(d.label, xP(i), P.t+cH+18); });
}

function drawChart(id, data, key, color, refVal, refLabel, fmtY, cssW, cssH){
  const c=document.getElementById(id); if(!c) return;
  c.width=Math.round(cssW*DPR); c.height=Math.round(cssH*DPR);
  c.style.width=cssW+"px"; c.style.height=cssH+"px";
  const ctx=c.getContext("2d"); ctx.scale(DPR,DPR);
  const P={t:10,r:12,b:26,l:52};
  const cW=cssW-P.l-P.r, cH=cssH-P.t-P.b;

  const vals = data.map(d=>+(d[key])||0);
  let allV = [...vals];
  if(refVal!=null) allV.push(refVal);
  const rawMax=Math.max(...allV,0.01), rawMin=Math.min(...allV,0);
  const rng=rawMax-rawMin||1;
  const mn=rawMin<0?rawMin-rng*.08:0, mx=rawMax+rng*.15;

  const xP = i => P.l + (data.length>1 ? i/(data.length-1):0.5)*cW;
  const yP = v => P.t + cH - ((v-mn)/(mx-mn))*cH;

  const GRID="rgba(235,229,220,0.8)", TICK="#a0917e", TF="9px 'DM Mono',monospace";

  for(let i=0;i<=4;i++){
    const y=P.t+(i/4)*cH;
    ctx.strokeStyle=GRID; ctx.lineWidth=1; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(P.l,y); ctx.lineTo(P.l+cW,y); ctx.stroke();
    ctx.fillStyle=TICK; ctx.font=TF; ctx.textAlign="right";
    ctx.fillText((fmtY||fBRLShort)(mx-(i/4)*(mx-mn)), P.l-4, y+3);
  }

  if(mn<0){
    ctx.strokeStyle="rgba(235,229,220,0.5)"; ctx.lineWidth=1; ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(P.l,yP(0)); ctx.lineTo(P.l+cW,yP(0)); ctx.stroke();
    ctx.setLineDash([]);
  }

  if(refVal!=null){
    const ry=yP(refVal);
    ctx.strokeStyle=color+"55"; ctx.lineWidth=1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(P.l,ry); ctx.lineTo(P.l+cW,ry); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=color; ctx.font="8px 'Inter',sans-serif"; ctx.textAlign="right";
    ctx.fillText(refLabel||"Meta", P.l+cW, ry-3);
  }

  if(data.length>=2){
    const zeroY = yP(Math.max(0,mn));
    ctx.beginPath(); ctx.moveTo(xP(0),yP(vals[0]));
    for(let i=1;i<data.length;i++) ctx.lineTo(xP(i),yP(vals[i]));
    ctx.lineTo(xP(data.length-1),zeroY); ctx.lineTo(xP(0),zeroY); ctx.closePath();
    const g=ctx.createLinearGradient(0,P.t,0,P.t+cH);
    g.addColorStop(0,color+"28"); g.addColorStop(1,color+"00");
    ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.setLineDash([]);
    ctx.moveTo(xP(0),yP(vals[0]));
    for(let i=1;i<data.length;i++) ctx.lineTo(xP(i),yP(vals[i]));
    ctx.stroke();
  }

  const step=data.length>60?7:data.length>30?3:data.length>14?2:1;
  ctx.fillStyle=TICK; ctx.font=TF; ctx.textAlign="center"; ctx.setLineDash([]);
  data.forEach((d,i)=>{ if(i%step===0) ctx.fillText(d.label, xP(i), P.t+cH+18); });
}

function setupTip(cid, tid, data, lines){
  const c=document.getElementById(cid), t=document.getElementById(tid);
  if(!c||!t) return;
  const PAD_L=58, PAD_R=52;
  c.addEventListener("mousemove", e=>{
    const rect=c.getBoundingClientRect();
    const relX = (e.clientX-rect.left) - PAD_L;
    const cW   = rect.width - PAD_L - PAD_R;
    if(relX<0 || relX>cW || !data.length){ t.style.display="none"; return; }
    const d = data[Math.max(0,Math.min(Math.round((relX/cW)*(data.length-1)),data.length-1))];
    let h=`<div class="tl">${d.label||d.date}</div>`;
    lines.forEach(l=>{
      const fmt = l.fmt || fBRL;
      h+=`<div class="tr"><span style="color:${l.color}">${l.name}</span><span class="tv">${fmt(+(d[l.key])||0)}</span></div>`;
    });
    t.innerHTML=h; t.style.display="block";
    const tw=t.offsetWidth, x=e.clientX-rect.left;
    t.style.left=(x+12+tw>rect.width-8 ? x-tw-12 : x+12)+"px";
    t.style.top=(e.clientY-rect.top-20)+"px";
  });
  c.addEventListener("mouseleave", ()=>t.style.display="none");
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const ld=document.getElementById("loading"), mn=document.getElementById("main-content");
  if(S.firstLoad&&S.loading){ ld.style.display="flex"; mn.style.display="none"; return; }
  ld.style.display="none"; mn.style.display="block";

  if(IS_FILE){
    mn.innerHTML=`
      <div class="hdr"><div><div class="hdr-title">Manual Definitivo para Construção e Venda de Casas Financiadas</div></div></div>
      <div class="file-warn">
        <h2>⚠️ Abra via servidor local</h2>
        <p>O browser bloqueia conexões externas quando o arquivo é aberto pelo Explorer (<code>file://</code>). Sirva via HTTP local:</p>
        <div class="step"><div class="sn">1</div><div>Abra o terminal na pasta do arquivo</div></div>
        <div class="step"><div class="sn">2</div><div>Execute:<code>python -m http.server 8080</code></div></div>
        <div class="step"><div class="sn">3</div><div>Acesse:<code>http://localhost:8080/dashboard.html</code></div></div>
      </div>`;
    return;
  }

  const daily  = getDaily();
  const totals = getTotals(daily);

  const roasC   = statusColor(totals.roas,   META_ROAS,   true);
  const cpvC    = statusColor(totals.cpv,    META_CPV,    false);
  const ticketC = statusColor(totals.ticket, META_TICKET, true);
  const lucroC  = totals.lucro >= 0 ? "#1a7a4a" : "#b91c1c";

  const QS = [{k:"hoje",l:"Hoje"},{k:"ontem",l:"Ontem"},{k:"7d",l:"7 dias"},{k:"30d",l:"30 dias"},{k:"mes",l:"Este mês"}];

  function kpi(lbl, val, sub, color){
    return `<div class="kc">
      <div class="kc-lbl">${lbl}</div>
      <div class="kc-val" style="color:${color}">${val}</div>
      ${sub ? `<div class="kc-sub">${sub}</div>` : ""}
    </div>`;
  }

  mn.innerHTML=`
    <div class="hdr">
      <div>
        <div class="hdr-title">Manual Definitivo para Construção e Venda de Casas Financiadas</div>
        <div class="hdr-sub">${S.ultimaVenda ? `última venda: ${S.ultimaVenda}` : "aguardando dados..."}${daily.length>0 ? ` · ${daily.length} dias` : ""}</div>
      </div>
      <button class="btn-refresh" onclick="loadData()" ${S.loading?"disabled":""}>${S.loading?"Carregando...":"↻ Atualizar"}</button>
    </div>

    ${S.error ? `<div class="err">⚠️ ${S.error}</div>` : ""}

    <div class="period-wrap">
      <div class="period-top">
        <span class="period-lbl">Período</span>
        <div class="drbox">
          <span class="drbox-icon">📅</span>
          <input type="date" value="${S.startDate}" onchange="onDC('s',this.value)"/>
          <span class="drbox-sep">—</span>
          <input type="date" value="${S.endDate}" onchange="onDC('e',this.value)"/>
        </div>
      </div>
      <div class="period-quick">
        ${QS.map(q=>`<button class="btn-q${S.activeQuick===q.k?" on":""}" onclick="applyQuick('${q.k}')">${q.l}</button>`).join("")}
      </div>
    </div>

    <div class="g3" style="margin-bottom:12px">
      ${kpi("Investimento", fBRL(totals.spend),       `${totals.vendas} vendas · ${daily.length} dias`, "#1c1410")}
      ${kpi("ROAS",         totals.roas.toFixed(2)+"x", `Meta: ${META_ROAS.toFixed(2)}x`,              roasC)}
      ${kpi("Faturamento",  fBRL(totals.faturamento),  "",                                               "#1c1410")}
    </div>
    <div class="g3" style="margin-bottom:18px">
      ${kpi("Custo por Venda", fBRL(totals.cpv),    `Meta: ${fBRL(META_CPV)}`,                 cpvC)}
      ${kpi("Ticket Médio",    fBRL(totals.ticket), `Meta: ${fBRL(META_TICKET)}`,              ticketC)}
      ${kpi("Lucro Bruto",     fBRL(totals.lucro),  "Fat. − invest.×1,1215",                  lucroC)}
    </div>

    <div class="status-legend">
      <span class="sl"><span class="sl-dot" style="background:#1a7a4a"></span>Dentro da meta</span>
      <span class="sl"><span class="sl-dot" style="background:#c07800"></span>Até 10% fora</span>
      <span class="sl"><span class="sl-dot" style="background:#b91c1c"></span>Mais de 10% fora</span>
    </div>

    <div class="cc" style="margin-bottom:12px;position:relative">
      <div class="ch">
        <span class="ct">Investimento × Custo por Venda</span>
        <div class="lg">
          <span class="li"><span class="ll" style="background:#2d7d9a"></span>Invest. (esq.)</span>
          <span class="li"><span class="ll" style="background:#a06000"></span>CPV (dir.)</span>
        </div>
      </div>
      <div style="position:relative">
        <canvas id="c-dual"></canvas>
        <div class="tip" id="t-dual"></div>
      </div>
    </div>

    <div class="charts-2x2">
      <div class="cc" style="position:relative">
        <div class="ch"><span class="ct">ROAS diário</span><span class="li"><span class="ld" style="background:#1a7a4a"></span>ROAS</span></div>
        <div style="position:relative"><canvas id="c-roas"></canvas><div class="tip" id="t-roas"></div></div>
      </div>
      <div class="cc" style="position:relative">
        <div class="ch"><span class="ct">Faturamento</span><span class="li"><span class="ld" style="background:#2d7d9a"></span>diário</span></div>
        <div style="position:relative"><canvas id="c-fat"></canvas><div class="tip" id="t-fat"></div></div>
      </div>
      <div class="cc" style="position:relative">
        <div class="ch"><span class="ct">Ticket Médio</span><span class="li"><span class="ld" style="background:#6d5a9a"></span>R$/venda</span></div>
        <div style="position:relative"><canvas id="c-tick"></canvas><div class="tip" id="t-tick"></div></div>
      </div>
      <div class="cc" style="position:relative">
        <div class="ch"><span class="ct">Lucro Bruto</span><span class="li"><span class="ld" style="background:#5a7a5a"></span>diário</span></div>
        <div style="position:relative"><canvas id="c-lucro"></canvas><div class="tip" id="t-lucro"></div></div>
      </div>
    </div>

    <p class="foot">Base Meta (Stract) + Base Vendas (Eduzz) · Google Sheets API v4</p>`;

  requestAnimationFrame(()=>{
    const mW = document.getElementById("c-dual")?.parentElement?.offsetWidth  || 720;
    const sW = document.getElementById("c-roas")?.parentElement?.offsetWidth  || 340;

    drawDual("c-dual", daily, mW, 230);

    drawChart("c-roas",  daily, "roas",   "#1a7a4a", META_ROAS, "Meta 1.8x", v=>v.toFixed(2)+"x", sW, 170);
    drawChart("c-fat",   daily, "faturamento", "#2d7d9a", null, null, fBRLShort, sW, 170);
    drawChart("c-tick",  daily, "ticket", "#6d5a9a", META_TICKET, "Meta R$18", fBRLShort, sW, 170);
    drawChart("c-lucro", daily, "lucro",  "#5a7a5a", null, null, fBRLShort, sW, 170);

    setupTip("c-dual",  "t-dual",  daily, [
      {key:"spend",       color:"#2d7d9a", name:"Investimento"},
      {key:"cpv",         color:"#a06000", name:"CPV"},
    ]);
    setupTip("c-roas",  "t-roas",  daily, [{key:"roas",         color:"#1a7a4a", name:"ROAS",        fmt:v=>v.toFixed(2)+"x"}]);
    setupTip("c-fat",   "t-fat",   daily, [{key:"faturamento",  color:"#2d7d9a", name:"Faturamento"}]);
    setupTip("c-tick",  "t-tick",  daily, [{key:"ticket",       color:"#6d5a9a", name:"Ticket"}]);
    setupTip("c-lucro", "t-lucro", daily, [{key:"lucro",        color:"#5a7a5a", name:"Lucro"}]);
  });
}

render();
loadData();
</script>
