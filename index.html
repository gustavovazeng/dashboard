<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Manual Definitivo — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--card:#121826;--border:rgba(255,255,255,.07);--border-h:rgba(255,255,255,.12);
  --text:#e8edf6;--text-strong:#f1f5fb;--muted:#8a96ab;--hint:#6b7689;
  --accent:#3b82f6;--accent-bg:rgba(59,130,246,.16);
  --green:#34d399;--amber:#fbbf24;--red:#f87171;
  --surf:rgba(255,255,255,.03);
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* ─── App Header ─────────────────────────────────────────────────── */
.app-hdr{position:sticky;top:0;z-index:20;background:rgba(12,17,28,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:0 26px;height:54px;
  display:flex;align-items:center;justify-content:space-between;gap:16px}

/* Funil dropdown */
.funil-wrap{position:relative}
.funil-btn{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9px;border:1px solid var(--border);background:var(--surf);cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;transition:border-color .15s}
.funil-btn:hover{border-color:var(--border-h)}
.funil-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.funil-name{font-size:12px;font-weight:600;color:var(--text-strong)}
.funil-status{font-size:9px;color:var(--green);letter-spacing:.04em}
.funil-chevron{color:var(--muted);font-size:10px;margin-left:2px}
.funil-menu{position:absolute;top:calc(100% + 6px);left:0;background:#1a2236;border:1px solid var(--border-h);border-radius:10px;padding:4px;min-width:180px;box-shadow:0 6px 30px rgba(2,6,20,.45);z-index:100}
.funil-opt{padding:8px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);transition:all .12s;display:flex;align-items:center;gap:8px}
.funil-opt:hover{background:var(--accent-bg);color:var(--text)}
.funil-opt.fopt-active{background:var(--accent-bg);color:#cfe0ff}
.fopt-dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.funil-opt.fopt-active .fopt-dot{background:var(--green)}

/* Nav tabs */
.hdr-tabs{display:flex;align-items:center;gap:4px}
.htab{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap}
.htab:hover{color:var(--text)}
.htab.htab-active{background:rgba(59,130,246,.16);color:#fff}
.htab-icon{font-size:13px}

/* Period controls */
.hdr-right{display:flex;align-items:center;gap:8px}
.presets{display:flex;gap:4px}
.btn-pre{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 11px;border-radius:8px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .12s;white-space:nowrap}
.btn-pre:hover{border-color:var(--border-h);color:var(--text)}
.btn-pre.on{background:rgba(59,130,246,.16);border-color:rgba(96,165,250,.35);color:#cfe0ff;font-weight:600}
.drbox{display:flex;align-items:center;background:var(--surf);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .15s;padding:0 6px;gap:3px}
.drbox:focus-within{border-color:rgba(96,165,250,.5)}
.drbox-icon{color:var(--hint);font-size:12px;user-select:none}
.drbox input[type=date]{background:transparent;border:none;outline:none;color:var(--text);font-size:11px;font-family:'JetBrains Mono',monospace;padding:5px 4px;cursor:pointer;color-scheme:dark;width:100px}
.drbox-sep{color:var(--hint);font-size:11px;user-select:none}
.btn-update{background:rgba(59,130,246,.16);border:1px solid rgba(96,165,250,.3);color:#60a5fa;padding:5px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;white-space:nowrap;box-shadow:0 0 16px rgba(59,130,246,.2)}
.btn-update:hover:not(:disabled){box-shadow:0 0 16px rgba(59,130,246,.4)}
.btn-update:disabled{opacity:.4;cursor:not-allowed}

/* ─── Content ────────────────────────────────────────────────────── */
.app-content{max-width:1640px;margin:0 auto;padding:22px 30px 40px}
.page{display:none}.page.active{display:block}

/* Page header */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.hdr-title{font-size:22px;font-weight:700;font-family:'Sora',sans-serif;color:var(--text-strong);line-height:1.25}
.hdr-sub{margin-top:5px;font-size:11px;color:var(--hint);font-family:'JetBrains Mono',monospace}
.err{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:var(--red);line-height:1.5}

/* KPIs */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:13px}
.kc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:border-color .2s}
.kc:hover{border-color:var(--border-h)}
.kc-lbl{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-weight:700}
.kc-val{font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:-.02em;font-size:22px;line-height:1.1;color:var(--text-strong)}
.kc-val-sm{font-size:18px}
.kc-sub{font-size:10px;color:var(--hint);margin-top:5px;font-family:'JetBrains Mono',monospace}
.kc-date{font-size:9px;color:var(--hint);margin-bottom:4px;font-family:'JetBrains Mono',monospace;font-weight:500}

/* Section label */
.section-lbl{font-size:9px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;margin-top:20px}

/* Status legend */
.status-legend{display:flex;gap:16px;margin-bottom:14px}
.sl{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--hint)}
.sl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Charts */
.cc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px 14px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ct{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.lg{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.ll{width:14px;height:2px;border-radius:2px}
.ld{width:7px;height:7px;border-radius:50%}
.charts-2x2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.charts-2x3{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}

/* Toggle overlay buttons */
.overlay-btns{display:flex;gap:6px}
.btn-overlay{font-size:10px;padding:3px 10px;border-radius:5px;border:1px solid var(--border-h);color:var(--muted);background:transparent;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
.btn-overlay:hover{border-color:var(--accent);color:var(--text)}
.btn-overlay.on{background:var(--accent-bg);border-color:rgba(96,165,250,.4);color:#60a5fa;font-weight:600}

/* Tooltip */
.tip{background:#1a2236;border:1px solid var(--border-h);border-radius:8px;padding:10px 13px;font-size:12px;box-shadow:0 4px 16px rgba(2,6,20,.45);display:none;position:absolute;pointer-events:none;z-index:20;min-width:150px}
.tl{color:var(--hint);margin-bottom:5px;font-weight:500;font-size:10px;font-family:'JetBrains Mono',monospace}
.tr{display:flex;justify-content:space-between;gap:14px;margin-bottom:2px;font-size:11px}
.tv{color:var(--text-strong);font-weight:600;font-family:'JetBrains Mono',monospace}

/* Spinner */
.sw{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px}
.sp{width:32px;height:32px;border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.st{color:var(--hint);font-size:13px}
.foot{margin-top:18px;font-size:10px;color:var(--hint);text-align:center;font-family:'JetBrains Mono',monospace;opacity:.5}
canvas{display:block}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer;filter:invert(1)}

/* Quick period inside pages (funil / análise) */
.period-wrap{margin-bottom:18px}
.period-top{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.period-lbl{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.drbox-sm{display:flex;align-items:center;background:var(--surf);border:1px solid var(--border);border-radius:7px;overflow:hidden;gap:2px;padding:0 5px}
.drbox-sm input[type=date]{background:transparent;border:none;outline:none;color:var(--text);font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 4px;cursor:pointer;color-scheme:dark;width:96px}
.period-quick{display:flex;gap:5px;flex-wrap:wrap}
.btn-q{background:transparent;border:1px solid var(--border);color:var(--hint);padding:4px 11px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap}
.btn-q:hover{border-color:var(--border-h);color:var(--text)}
.btn-q.on{background:var(--accent-bg);border-color:rgba(96,165,250,.35);color:#cfe0ff;font-weight:600}

/* Análise sub-tabs */
.ana-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;gap:0}
.ana-tab{padding:7px 14px;font-size:11px;font-weight:500;color:var(--hint);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.ana-tab:hover{color:var(--text)}
.ana-tab.active{color:#60a5fa;border-bottom-color:#3b82f6}
</style>
</head>
<body>
<!-- ─── App Header ───────────────────────────────────────────────── -->
<header class="app-hdr">
  <!-- Left: funil selector -->
  <div class="funil-wrap" id="funil-wrap">
    <button class="funil-btn" id="funil-btn" onclick="toggleFunilMenu(event)">
      <span class="funil-dot" id="funil-dot"></span>
      <div>
        <div class="funil-name" id="funil-name">Manual Definitivo</div>
        <div class="funil-status" id="funil-status">ativo</div>
      </div>
      <span class="funil-chevron">▾</span>
    </button>
    <div class="funil-menu" id="funil-menu" style="display:none">
      <div class="funil-opt fopt-active" id="fopt-manual" onclick="selectFunil('manual')"><span class="fopt-dot"></span>Manual Definitivo</div>
      <div class="funil-opt" id="fopt-mapa" onclick="selectFunil('mapa')"><span class="fopt-dot"></span>Mapa da Casa</div>
      <div class="funil-opt" id="fopt-geral" onclick="selectFunil('geral')"><span class="fopt-dot"></span>Consolidado</div>
    </div>
  </div>

  <!-- Center: navigation tabs -->
  <nav class="hdr-tabs" id="hdr-tabs">
    <button class="htab htab-active" id="htab-principal" onclick="navTo('principal')"><span class="htab-icon">⊞</span>Principal</button>
    <button class="htab" id="htab-trafego" onclick="navTo('trafego')"><span class="htab-icon">⟳</span>Métricas tráfego</button>
    <button class="htab" id="htab-funil" onclick="navTo('funil')"><span class="htab-icon">▽</span>Métricas do funil</button>
    <button class="htab" id="htab-anuncios" onclick="navTo('anuncios')"><span class="htab-icon">◈</span>Anúncios</button>
  </nav>

  <!-- Right: period + refresh -->
  <div class="hdr-right">
    <div class="presets" id="hdr-presets">
      <button class="btn-pre" id="hpre-hoje" onclick="applyQuickCurrent('hoje')">Hoje</button>
      <button class="btn-pre" id="hpre-ontem" onclick="applyQuickCurrent('ontem')">Ontem</button>
      <button class="btn-pre" id="hpre-7d" onclick="applyQuickCurrent('7d')">7 dias</button>
      <button class="btn-pre on" id="hpre-30d" onclick="applyQuickCurrent('30d')">30 dias</button>
    </div>
    <div class="drbox">
      <span class="drbox-icon">📅</span>
      <input type="date" id="hdr-start" onchange="onDCCurrent('s',this.value)"/>
      <span class="drbox-sep">→</span>
      <input type="date" id="hdr-end" onchange="onDCCurrent('e',this.value)"/>
    </div>
    <button class="btn-update" id="btn-update" onclick="loadData(true)">↻ Atualizar</button>
  </div>
</header>

<!-- ─── Content ──────────────────────────────────────────────────── -->
<div class="app-content">
  <div class="sw" id="loading"><div class="sp"></div><p class="st">Carregando dados...</p></div>
  <div id="page-principal"       class="page active"></div>
  <div id="page-trafego"         class="page"></div>
  <div id="page-anuncios"        class="page"></div>
  <div id="page-funil"           class="page"></div>
  <div id="page-geral-principal" class="page"></div>
  <div id="page-geral-funil"     class="page"></div>
</div>

<script>
const IS_FILE = location.protocol === "file:";
const SHEET_ID_META        = "1gaMsxGBZ75oVeDJYQo0vdrW6PGoPC4DuxBmkbJ_Yf9s";
const SHEET_ID_META_MAPA   = "1C1wWJplGPSwBHkn4E8cpVpeBDjnZOzf_tY0FLEkPiOw";
const SHEET_ID_VENDAS      = "1JlVCbaJwJYgfhJW4XZHptWlAeQdHUQcFDgpGyga-lBA";
const API_KEY  = "AIzaSyDxMp-u0RUfy-Xv0jICULZbJGpuAUxqQPI";
const URL_META      = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID_META}/values/${encodeURIComponent("Base Meta")}?key=${API_KEY}`;
const URL_META_MAPA = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID_META_MAPA}/values/${encodeURIComponent("Base Meta")}?key=${API_KEY}`;
const URL_VENDAS    = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID_VENDAS}/values/${encodeURIComponent("📥 Base Vendas - Completo")}?key=${API_KEY}`;
const URL_HIST      = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID_VENDAS}/values/${encodeURIComponent("📥 Base Vendas - Completo - manual")}?key=${API_KEY}`;

// Mapeamento do funil — ordem importa
const FUNIL_PRODUTOS = [
  {id:"manual",    label:"Manual Definitivo",       step:"Entrada (Front-end)",
   match: n => /manual definitivo/i.test(n)},
  {id:"checklist", label:"Checklist",               step:"Order Bump 1",
   match: n => /checklist/i.test(n)},
  {id:"planFin",   label:"Planilha Financiamento",  step:"Order Bump 2",
   match: n => /financiamento/i.test(n) && !/guia|passo|caixa/i.test(n)},
  {id:"planLucro", label:"Planilha Lucro",          step:"Upsell",
   match: n => /lucro/i.test(n)},
  {id:"curso",     label:"Curso",                   step:"Ascensão",
   match: n => /caixa|guia definitivo|passo a passo/i.test(n)},
];
// Produtos a ignorar completamente
const FUNIL_IGNORAR = n => /mapa da casa|raiox/i.test(n);

// Cache localStorage
const CACHE_KEY="dash_v2";

// Metas aba Principal
const META_CPV=10, META_ROAS=1.80, META_TICKET=18;
const TAXA_IMPOSTO=1.1215;

// Metas aba Tráfego
const METAS_T = {
  cpc:   {val:1.33,  higher:false},
  ctr:   {val:1.35,  higher:true},
  cpm:   {val:18.00, higher:false},
  txPagChk: {val:25, higher:true},
  txChkVnd: {val:55, higher:true},
  connect:  {val:85, higher:true},
};

// Chart colors — dark mode
const CHART_COLOR = "#3b82f6";
const CHART_INV   = "#3b82f6";
const CHART_CPV   = "#fbbf24";

// State
const S = {
  currentFunil:"manual", // "manual" | "mapa"
  // ── Dados Manual ──
  meta:{}, vendas:{},
  metaByAd:{},
  metaByAdByDate:{},
  vendasByAd:{},
  vendasByAdDate:{},
  funilRows:[],
  funil:{},
  updated:null,
  // ── Dados Mapa ──
  mapa:{
    meta:{}, vendas:{},
    metaByAd:{}, metaByAdByDate:{},
    vendasByAd:{}, vendasByAdDate:{},
    funilRows:[], funil:{},
    updated:null,
  },
  // ── Dados Geral (Consolidado Manual+Mapa) ──
  geral:{
    meta:{}, vendas:{},
    funilRows:[], funil:{},
  },
  loading:false, error:null, firstLoad:true,
  // Principal
  startDate:nDaysAgoISO(29), endDate:todayISO(), activeQuick:"30d",
  // Tráfego
  tStartDate:nDaysAgoISO(29), tEndDate:todayISO(), tActiveQuick:"30d",
  // Anúncios
  aStartDate:nDaysAgoISO(29), aEndDate:todayISO(), aActiveQuick:"30d",
  aSort:{col:"spend",dir:"desc"},
  // Funil
  fStartDate:"",
  fEndDate:"",
  fActiveQuick:"all",
  // Geral Principal
  gStartDate:nDaysAgoISO(29), gEndDate:todayISO(), gActiveQuick:"30d",
  // Geral Funil
  gfStartDate:"", gfEndDate:"", gfActiveQuick:"all",
  aTab:"tempo",
  anaStartDate:"", anaEndDate:"", anaActiveQuick:"all",
  anaTempoProd1:"mapa", anaTempoProd2:"curso",
  anaJornadaFiltro:"all", anaJornadaSort:"freq",
  anaStatusFiltro:"all", anaStatusGroup:"produto",
  // Overlay toggles por gráfico
  overlays:{cpc:{inv:false,cpv:false},ctr:{inv:false,cpv:false},cpm:{inv:false,cpv:false},
    txPagChk:{inv:false,cpv:false},txChkVnd:{inv:false,cpv:false},connect:{inv:false,cpv:false}},
  currentPage:"principal",
};

// ── Header period helpers ──────────────────────────────────────────────────
// Retorna período atual da página ativa
function getCurrentPeriod(){
  const p=S.currentPage;
  if(p==='trafego')      return {s:S.tStartDate, e:S.tEndDate, q:S.tActiveQuick};
  if(p==='anuncios')     return {s:S.aStartDate, e:S.aEndDate, q:S.aActiveQuick};
  if(p==='funil')        return {s:S.fStartDate, e:S.fEndDate, q:S.fActiveQuick};
  if(p==='geral-principal') return {s:S.gStartDate, e:S.gEndDate, q:S.gActiveQuick};
  if(p==='geral-funil')  return {s:S.gfStartDate, e:S.gfEndDate, q:S.gfActiveQuick};
  return {s:S.startDate, e:S.endDate, q:S.activeQuick};
}
// Aplica quick ao período da página ativa
function applyQuickCurrent(k){
  const p=S.currentPage;
  const t=todayISO();
  const map={hoje:()=>({s:t,e:t}),ontem:()=>{const y=yesterdayISO();return{s:y,e:y}},
    "7d":()=>({s:nDaysAgoISO(6),e:t}),"30d":()=>({s:nDaysAgoISO(29),e:t}),mes:()=>({s:firstOfMonthISO(),e:t})};
  const r=map[k]?.();if(!r)return;
  if(p==='trafego'){S.tStartDate=r.s;S.tEndDate=r.e;S.tActiveQuick=k;}
  else if(p==='anuncios'){S.aStartDate=r.s;S.aEndDate=r.e;S.aActiveQuick=k;}
  else if(p==='funil'){S.fStartDate=r.s;S.fEndDate=r.e;S.fActiveQuick=k;}
  else if(p==='geral-principal'){S.gStartDate=r.s;S.gEndDate=r.e;S.gActiveQuick=k;}
  else if(p==='geral-funil'){S.gfStartDate=r.s;S.gfEndDate=r.e;S.gfActiveQuick=k;}
  else{S.startDate=r.s;S.endDate=r.e;S.activeQuick=k;}
  render();
}
// Date custom input do header
function onDCCurrent(w,v){
  const p=S.currentPage;
  if(p==='trafego'){if(w==='s')S.tStartDate=v;else S.tEndDate=v;S.tActiveQuick="";}
  else if(p==='anuncios'){if(w==='s')S.aStartDate=v;else S.aEndDate=v;S.aActiveQuick="";}
  else if(p==='funil'){if(w==='s')S.fStartDate=v;else S.fEndDate=v;S.fActiveQuick="";}
  else if(p==='geral-principal'){if(w==='s')S.gStartDate=v;else S.gEndDate=v;S.gActiveQuick="";}
  else if(p==='geral-funil'){if(w==='s')S.gfStartDate=v;else S.gfEndDate=v;S.gfActiveQuick="";}
  else{if(w==='s')S.startDate=v;else S.endDate=v;S.activeQuick="";}
  render();
}
// Abre/fecha dropdown de funil
function toggleFunilMenu(e){
  e.stopPropagation();
  const m=document.getElementById("funil-menu");
  m.style.display=m.style.display==="none"?"block":"none";
}
document.addEventListener("click",()=>{
  const m=document.getElementById("funil-menu");
  if(m) m.style.display="none";
});
// Seleciona funil via dropdown
function selectFunil(id){
  document.getElementById("funil-menu").style.display="none";
  switchFunil(id);
}
// Atualiza visual do header
function renderHeader(){
  const p=S.currentPage;
  const isGeral=S.currentFunil==="geral";
  // Funil selector
  const names={manual:"Manual Definitivo",mapa:"Mapa da Casa",geral:"Consolidado"};

// ── Date helpers (GMT-3 São Paulo) ─────────────────────────────────────────
function nowSP(){ return new Date(Date.now()-3*60*60*1000); }
function toISODate(d){ return d.toISOString().split("T")[0]; }
function todayISO(){ return toISODate(nowSP()); }
function yesterdayISO(){ const d=nowSP();d.setDate(d.getDate()-1);return toISODate(d); }
function nDaysAgoISO(n){ const d=nowSP();d.setDate(d.getDate()-n);return toISODate(d); }
function firstOfMonthISO(){ const d=nowSP();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`; }
function addDays(iso,n){ const d=new Date(iso+"T12:00:00Z");d.setDate(d.getDate()+n);return toISODate(d); }
function subDays(iso,n){ return addDays(iso,-n); }

// ── Format helpers ─────────────────────────────────────────────────────────
function parseBRL(s){ if(!s||s==="-"||s==="0")return 0;return parseFloat(String(s).replace(/R\$\s*/g,"").replace(/\./g,"").replace(",",".").trim())||0; }
function parseBRLAbs(s){ return Math.abs(parseBRL(s)); }

// Normaliza status numérico da Eduzz para texto
function normalizeStatus(s){
  if(!s && s!==0) return "";
  const m={
    "1":"Aberta",
    "3":"Paga",
    "6":"Aguardando Reembolso",
    "7":"Reembolsado",
    "10":"Expirado",
    "11":"Em Recuperacao",
    "15":""
  };
  const str=String(s).trim();
  return m[str]||str;
}

// Extrai só a data de strings com ou sem horário: "dd/mm/yyyy HH:MM:SS" → "dd/mm/yyyy"
function stripTime(s){
  if(!s) return s;
  return String(s).trim().split(" ")[0];
}
function toISO(s){ if(!s||s==="Date"||s==="")return null;s=String(s).trim().split(" ")[0]; if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const p=s.split("/");if(p.length===3){const y=p[2].length===4?p[2]:"20"+p[2];return `${y}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;}return null; }
function fBRL(n){ return "R$ "+(n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fBRLShort(n){ const a=Math.abs(n||0),sg=n<0?"-":"";if(a>=1000)return sg+"R$"+(a/1000).toFixed(1)+"k";return sg+"R$"+Math.round(a); }
function fPct(n){ return (n||0).toFixed(1)+"%"; }
function fDate(iso){ if(!iso)return"";const[,m,d]=iso.split("-");return `${d}/${m}`; }
function fDateBR(iso){ if(!iso)return"";const[y,m,d]=iso.split("-");return `${d}/${m}/${y}`; }
function parseSheet(json){ const rows=json.values||[];if(rows.length<2)return[];const h=rows[0];return rows.slice(1).map(r=>Object.fromEntries(h.map((k,i)=>[k,(r[i]||"").trim()]))); }

// Status color — dark mode semantics
function statusColor(val,meta,higherIsBetter){
  if(!val||val===0)return "#8a96ab";
  const ratio=val/meta;
  if(higherIsBetter){ if(ratio>=1)return "#34d399";if(ratio>=0.9)return "#fbbf24";return "#f87171"; }
  else { if(ratio<=1)return "#34d399";if(ratio<=1.1)return "#fbbf24";return "#f87171"; }
}
// Card border color from status color
function statusBorder(val,meta,higherIsBetter){
  const c=statusColor(val,meta,higherIsBetter);
  if(c==="#34d399") return "rgba(52,211,153,.22)";
  if(c==="#fbbf24") return "rgba(251,191,36,.22)";
  if(c==="#f87171") return "rgba(248,113,113,.22)";
  return "var(--border)";
}

// ── Ad ID / advCode helpers ───────────────────────────────────────────────
// Extrai código adv/adi/adc + dígitos do nome do anúncio
// Ignora prefixo "teste-"
function extractAdvCode(name){
  if(!name) return null;
  // remove prefixo teste- case-insensitive
  const clean=name.replace(/^teste-/i,"");
  const m=clean.match(/ad[vic]\d+/i);
  return m ? m[0].toLowerCase() : null;
}

// Extrai Ad ID numérico de 15-20 dígitos de uma string que pode ser:
// "120247448870650228" ou "manual_defin-venda-adv289|120247448870650228::..."
function extractAdId(raw){
  if(!raw) return null;
  // já é um número puro
  if(/^\d{15,20}$/.test(raw.trim())) return raw.trim();
  // busca sequência de 15-20 dígitos
  const m=raw.match(/\d{15,20}/);
  return m ? m[0] : null;
}

// ── Load data ──────────────────────────────────────────────────────────────
// Busca uma aba em blocos de 5000 linhas para evitar timeout em abas grandes
async function fetchSheetPaged(sheetId, tabName, apiKey, blockSize=5000){
  const base=`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/`;
  const enc=encodeURIComponent(tabName);
  const headRes=await fetch(`${base}${enc}!A1:ZZ1?key=${apiKey}`);
  if(!headRes.ok) throw new Error(`HTTP ${headRes.status} ao carregar ${tabName}`);
  const headJ=await headRes.json();
  const header=(headJ.values||[])[0]||[];
  let allRows=[header];
  let startRow=2;
  while(true){
    const endRow=startRow+blockSize-1;
    const range=`${enc}!A${startRow}:ZZ${endRow}`;
    const res=await fetch(`${base}${range}?key=${apiKey}`);
    if(!res.ok) throw new Error(`HTTP ${res.status} ao carregar ${tabName} (linha ${startRow})`);
    const j=await res.json();
    const rows=j.values||[];
    if(!rows.length) break;
    allRows=[...allRows,...rows];
    if(rows.length<blockSize) break;
    startRow+=blockSize;
  }
  return {values:allRows};
}

    }catch(e){ localStorage.removeItem(CACHE_KEY); }

        for(const r of parseSheet(vj)){

          const nomeOB1=(r["Nome do orderbump 01"]||"").toUpperCase();
          const nomeOB2=(r["Nome do orderbump 02"]||"").toUpperCase();
          const ehMapa=nomePrincipal.includes("MAPA DA CASA")||nomeOB1.includes("MAPA DA CASA")||nomeOB2.includes("MAPA DA CASA");
          if(!ehMapa) continue;
          const st=normalizeStatus((r["Status da compra"]||"").trim());
          if(!st) continue;
          const d=toISO(r["Data da compra"]);if(!d)continue;
          const em=(r["Email"]||"").toLowerCase().trim();
          const cpf=(r["CPF Comprador"]||"").replace(/[^\d]/g,"");
          const tel=(r["Telefone"]||"").replace(/[^\d]/g,"");
          const identity=em||cpf||tel;if(!identity)continue;
          const key=identity+"|"+d;
          const campos=[
            {nome:nomePrincipal, val:r["Valor do produto principal"]||r["Valor do produto"]||"0", taxa:r["Taxa da plataforma"]||"0"},
            {nome:nomeOB1,       val:r["Valor order bump 01"]||"0", taxa:"0"},
            {nome:nomeOB2,       val:r["Valor order bump 02"]||"0", taxa:"0"},
          ];
          let valor=0, taxa=0;
          for(const c of campos){
            if(!c.nome) continue;
            const pid=classifyProduct(c.nome,"mapa");
            if(pid==="mapa"||pid==="guiaCaixa"||pid==="checklist"){
              valor+=parseBRL(c.val);
              taxa+=parseBRLAbs(c.taxa);
            }
          }
          if(!whGrupos.has(key)){
            whGrupos.set(key,{st,d,valor,taxa,adId:extractAdId(r["Ad Id"]||"")});
          } else {
            const g=whGrupos.get(key);
            if((ST_PRI[st]||0)>(ST_PRI[g.st]||0)) g.st=st;
          }
        }
        for(const [,g] of whGrupos){
          if(g.st!=="Paga") continue;
          if(!vD[g.d])vD[g.d]={qtd:0,valor:0,taxa:0};
          vD[g.d].qtd+=1; vD[g.d].valor+=g.valor; vD[g.d].taxa+=g.taxa;
          if(g.adId){
            if(!vByAd[g.adId])vByAd[g.adId]={qtd:0,valor:0,taxa:0};
            vByAd[g.adId].qtd+=1; vByAd[g.adId].valor+=g.valor; vByAd[g.adId].taxa+=g.taxa;
            if(!vByAdDate[g.adId]) vByAdDate[g.adId]={};
            if(!vByAdDate[g.adId][g.d]) vByAdDate[g.adId][g.d]={qtd:0,valor:0,taxa:0};
            vByAdDate[g.adId][g.d].qtd+=1; vByAdDate[g.adId][g.d].valor+=g.valor; vByAdDate[g.adId][g.d].taxa+=g.taxa;
          }
        }
      }
      // Histórica Mapa
      {
        const grupos=new Map();
        for(const r of histRows){
          const st=(r["Status da compra"]||"").trim();
          if(st!=="Paga") continue;
          const prodId=classifyProduct(r["Nome do produto"]||"","mapa");
          if(!prodId) continue;
          const d=toISO(r["Data da compra"]);if(!d)continue;
          const em=(r["Email"]||"").toLowerCase().trim();
          const cpf=(r["CPF Comprador"]||"").replace(/[^\d]/g,"");
          const tel=(r["Telefone"]||"").replace(/[^\d]/g,"");
          const identity=em||cpf||tel;if(!identity)continue;
          const key=identity+"|"+d;
          if(!grupos.has(key)) grupos.set(key,{d,mapa:false,valor:0,taxa:0,adId:null,rows:[]});
          const g=grupos.get(key);
          g.rows.push(r);
          const OB_IDS_MAPA=new Set(["mapa","guiaCaixa","checklist"]);
          if(OB_IDS_MAPA.has(prodId)){
            g.valor+=parseBRL(r["Valor do produto"]);
            g.taxa+=parseBRLAbs(r["Taxa da plataforma"]);
          }
          if(prodId==="mapa"){
            g.mapa=true;
            if(!g.adId) g.adId=extractAdId(r["Ad Id"]||"");
          }
        }
        for(const [,g] of grupos){
          if(!g.mapa) continue;
          const d=g.d;
          if(!vD[d])vD[d]={qtd:0,valor:0,taxa:0};
          vD[d].qtd+=1; vD[d].valor+=g.valor; vD[d].taxa+=g.taxa;
          if(g.adId){
            if(!vByAd[g.adId])vByAd[g.adId]={qtd:0,valor:0,taxa:0};
            vByAd[g.adId].qtd+=1; vByAd[g.adId].valor+=g.valor; vByAd[g.adId].taxa+=g.taxa;
            if(!vByAdDate[g.adId]) vByAdDate[g.adId]={};
            if(!vByAdDate[g.adId][d]) vByAdDate[g.adId][d]={qtd:0,valor:0,taxa:0};
            vByAdDate[g.adId][d].qtd+=1; vByAdDate[g.adId][d].valor+=g.valor; vByAdDate[g.adId][d].taxa+=g.taxa;
          }
        }
      }
      S.mapa.vendas=vD; S.mapa.vendasByAd=vByAd; S.mapa.vendasByAdDate=vByAdDate;
    }

    // ── Funil Manual — combina webhook (expandido) + histórica ───────────────
    const rawFunil = parseSheet(fj);
    const webhookFunilRows = expandFunilRows(rawFunil,"manual");
    S.funilRows = [...webhookFunilRows, ...histRows.filter(r=>classifyProduct(r["Nome do produto"],"manual")!==null)];
    try{ S.funil = buildFunilData(S.funilRows, S.fStartDate, S.fEndDate); }
    catch(fe){ console.error("buildFunilData error:",fe); S.funil={}; }

    // ── Funil Mapa ──
    S.mapa.funilRows = [...expandFunilRows(rawFunil,"mapa"), ...histRows.filter(r=>classifyProduct(r["Nome do produto"],"mapa")!==null)];
    try{ S.mapa.funil = buildFunilData(S.mapa.funilRows, S.fStartDate, S.fEndDate, "mapa"); }
    catch(fe){ console.error("buildFunilData mapa error:",fe); S.mapa.funil={}; }

    // ── Geral: consolida Manual + Mapa sem duplicar produtos shared ───────────
    // Hist: cada linha classificada uma única vez (manual tem prioridade)
    const geralHistRows = histRows.map(r=>{
      const n=r["Nome do produto"]||"";
      const gf=classifyProduct(n,"manual")?"manual":classifyProduct(n,"mapa")?"mapa":null;
      return gf?{...r,_gf:gf}:null;
    }).filter(Boolean);
    // Webhook: cada transação expandida uma única vez (funil determinado pelo principal)
    const geralWebhookRows = [];
    for(const r of rawFunil){
      const nP=(r["Nome do produto principal"]||"");
      const pMan=classifyProduct(nP,"manual"), pMap=classifyProduct(nP,"mapa");
      const gf=pMan?"manual":pMap?"mapa":null;
      if(!gf) continue;
      const cols=[
        {n:nP, v:r["Valor do produto principal"]||r["Valor do produto"]||"0"},
        {n:r["Nome do orderbump 01"]||"", v:r["Valor order bump 01"]||"0"},
        {n:r["Nome do orderbump 02"]||"", v:r["Valor order bump 02"]||"0"},
      ];
      const st=normalizeStatus(r["Status da compra"]||"");
      for(const c of cols){
        if(!c.n) continue;
        const pid=classifyProduct(c.n,gf)||classifyProduct(c.n,gf==="manual"?"mapa":"manual");
        if(!pid) continue;
        geralWebhookRows.push({...r,"Nome do produto":c.n,"Valor do produto":c.v,"Status da compra":st,_gf:gf});
      }
    }
    S.geral.funilRows = [...geralWebhookRows, ...geralHistRows];
    // Combina meta por dia (soma Manual + Mapa)
    const allMetaDts=new Set([...Object.keys(S.meta),...Object.keys(S.mapa.meta)]);
    S.geral.meta={};
    for(const dt of allMetaDts){
      const m=S.meta[dt]||{spend:0,clicks:0,impressions:0,landingViews:0,checkouts:0};
      const mm=S.mapa.meta[dt]||{spend:0,clicks:0,impressions:0,landingViews:0,checkouts:0};
      S.geral.meta[dt]={spend:m.spend+mm.spend,clicks:m.clicks+mm.clicks,
        impressions:m.impressions+mm.impressions,landingViews:m.landingViews+mm.landingViews,
        checkouts:m.checkouts+mm.checkouts};
    }
    // Combina vendas por dia (Manual + Mapa não se sobrepõem — produto principal diferente)
    const allVendasDts=new Set([...Object.keys(S.vendas),...Object.keys(S.mapa.vendas)]);
    S.geral.vendas={};
    for(const dt of allVendasDts){
      const v=S.vendas[dt]||{qtd:0,valor:0,taxa:0};
      const vm=S.mapa.vendas[dt]||{qtd:0,valor:0,taxa:0};
      S.geral.vendas[dt]={qtd:v.qtd+vm.qtd,valor:v.valor+vm.valor,taxa:v.taxa+vm.taxa};
    }
    try{ S.geral.funil=buildGeralData(S.geral.funilRows,S.gfStartDate,S.gfEndDate); }
    catch(fe){ console.error("buildGeralData error:",fe); S.geral.funil={}; }

    // "Atualizado em" — última venda Paga do produto principal de cada funil
    function fmtUpdated(raw){
      if(!raw) return "—";
      const parts=raw.trim().split(" ");
      const datePart=parts[0];
      const timePart=parts[1]||"";
      const dp=datePart.split("/");
      const dateStr=dp.length===3?`${dp[0]}/${dp[1]}/${dp[2]}`:"";
      return timePart ? `${dateStr} ${timePart.slice(0,5)}` : dateStr;
    }
    function rawToISO(raw){
      if(!raw) return "";
      const parts=raw.trim().split(" ");
      const d=parts[0]; const t=parts[1]||"00:00:00";
      const dp=d.split("/");
      if(dp.length===3) return `${dp[2]}-${dp[1].padStart(2,"0")}-${dp[0].padStart(2,"0")}T${t}`;
      return d+"T"+t;
    }
    // Manual: última venda
    let lastManualSale="", lastManualSaleISO="";
    for(const r of rawFunil){
      const nm=(r["Nome do produto principal"]||"").toUpperCase();
      if(!nm.includes("MANUAL DEFINITIVO")) continue;
      const st=normalizeStatus((r["Status da compra"]||"").trim());
      if(st!=="Paga") continue;
      const raw=(r["Data da compra"]||"").trim();
      const iso=rawToISO(raw);
      if(iso > lastManualSaleISO){ lastManualSaleISO=iso; lastManualSale=raw; }
    }
    for(const r of histRows){
      const nm=(r["Nome do produto"]||"").toUpperCase();
      if(!nm.includes("MANUAL DEFINITIVO")) continue;
      const st=(r["Status da compra"]||"").trim();
      if(st!=="Paga") continue;
      const raw=(r["Data da compra"]||"").trim();
      const iso=rawToISO(raw);
      if(iso > lastManualSaleISO){ lastManualSaleISO=iso; lastManualSale=raw; }
    }
    S.updated=fmtUpdated(lastManualSale);
    // Mapa: última venda
    let lastMapaSale="", lastMapaSaleISO="";
    for(const r of rawFunil){
      const nm=(r["Nome do produto principal"]||"").toUpperCase();
      const nOB1=(r["Nome do orderbump 01"]||"").toUpperCase();
      const nOB2=(r["Nome do orderbump 02"]||"").toUpperCase();
      if(!nm.includes("MAPA DA CASA")&&!nOB1.includes("MAPA DA CASA")&&!nOB2.includes("MAPA DA CASA")) continue;
      const st=normalizeStatus((r["Status da compra"]||"").trim());
      if(st!=="Paga") continue;
      const raw=(r["Data da compra"]||"").trim();
      const iso=rawToISO(raw);
      if(iso > lastMapaSaleISO){ lastMapaSaleISO=iso; lastMapaSale=raw; }
    }
    for(const r of histRows){
      const nm=(r["Nome do produto"]||"").toUpperCase();
      if(!nm.includes("MAPA DA CASA")) continue;
      const st=(r["Status da compra"]||"").trim();
      if(st!=="Paga") continue;
      const raw=(r["Data da compra"]||"").trim();
      const iso=rawToISO(raw);
      if(iso > lastMapaSaleISO){ lastMapaSaleISO=iso; lastMapaSale=raw; }
    }
    S.mapa.updated=fmtUpdated(lastMapaSale);

    S.firstLoad=false;
  }catch(e){
    S.error="Erro ao processar dados: "+e.message;
    S.firstLoad=false;
    console.error("processing error:",e);
  }
  render();
}

// ── Derived — Principal ────────────────────────────────────────────────────
function getDaily(start,end){
  const d=D();
  const all=new Set([...Object.keys(d.meta),...Object.keys(d.vendas)]);
  return Array.from(all).sort().filter(dt=>dt>=start&&dt<=end).map(date=>{
    const m=d.meta[date]||{spend:0,clicks:0,impressions:0,landingViews:0,checkouts:0};
    const v=d.vendas[date]||{qtd:0,valor:0,taxa:0};
    const lucro=v.valor-v.taxa-(m.spend*TAXA_IMPOSTO);
    return{date,label:fDate(date),spend:m.spend,faturamento:v.valor,vendas:v.qtd,
      roas:m.spend>0?v.valor/m.spend:0,cpv:v.qtd>0?m.spend/v.qtd:0,
      ticket:v.qtd>0?v.valor/v.qtd:0,lucro};
  });
}
function getTotals(daily){
  const d=D();
  const t=daily.reduce((a,dt)=>({spend:a.spend+dt.spend,fat:a.fat+dt.faturamento,vendas:a.vendas+dt.vendas,
    taxa:a.taxa+(d.vendas[dt.date]?.taxa||0)}),{spend:0,fat:0,vendas:0,taxa:0});

    roas:t.spend>0?t.fat/t.spend:0,cpv:t.vendas>0?t.spend/t.vendas:0,
    ticket:t.vendas>0?t.fat/t.vendas:0,lucro:t.fat-t.taxa-(t.spend*TAXA_IMPOSTO)};
}

function getDailyT(start,end){

    const m=d.meta[date];
    const v=d.vendas[date]||{qtd:0};

    const ctr   = m.impressions>0 ? (m.clicks/m.impressions)*100 : 0;
    const cpm   = m.impressions>0 ? (m.spend/m.impressions)*1000 : 0;
    const txPagChk = m.landingViews>0 ? (m.checkouts/m.landingViews)*100 : 0;
    const txChkVnd = m.checkouts>0    ? (v.qtd/m.checkouts)*100           : 0;
    const connect  = m.clicks>0       ? (m.landingViews/m.clicks)*100     : 0;
    return{date,label:fDate(date),spend:m.spend,cpv:v.qtd>0?m.spend/v.qtd:0,
      cpc,ctr,cpm,txPagChk,txChkVnd,connect,
      clicks:m.clicks,impressions:m.impressions,landingViews:m.landingViews,
      checkouts:m.checkouts,vendas:v.qtd};
  });
}
function getTotalsT(daily){

  return{...t,
    cpc:   t.clicks>0       ? t.spend/t.clicks              : 0,
    ctr:   t.impressions>0  ? (t.clicks/t.impressions)*100  : 0,

  };
}

function applyQuick(k,prefix=""){
  const t=todayISO();
  const map={hoje:()=>{return{s:t,e:t}},ontem:()=>{const y=yesterdayISO();return{s:y,e:y}},
    "7d":()=>({s:nDaysAgoISO(6),e:t}),"30d":()=>({s:nDaysAgoISO(29),e:t}),mes:()=>({s:firstOfMonthISO(),e:t})};
  const r=map[k]?.();if(!r)return;
  if(!prefix){S.startDate=r.s;S.endDate=r.e;S.activeQuick=k;}
  else if(prefix==="t"){S.tStartDate=r.s;S.tEndDate=r.e;S.tActiveQuick=k;}
  else if(prefix==="a"){S.aStartDate=r.s;S.aEndDate=r.e;S.aActiveQuick=k;}
  else if(prefix==="g"){S.gStartDate=r.s;S.gEndDate=r.e;S.gActiveQuick=k;}
  render();
}
function onDC(w,v,prefix=""){
  if(!prefix){if(w==="s")S.startDate=v;else S.endDate=v;S.activeQuick="";}

  else if(prefix==="a"){if(w==="s")S.aStartDate=v;else S.aEndDate=v;S.aActiveQuick="";}

}

// ── Canvas drawing ─────────────────────────────────────────────────────────
const DPR=window.devicePixelRatio||1;
const GRID_C="rgba(255,255,255,0.06)";
const TICK_C="#6b7689";

function initCanvas(id,cssW,cssH){
  const c=document.getElementById(id);if(!c)return null;
  c.width=Math.round(cssW*DPR);c.height=Math.round(cssH*DPR);
  c.style.width=cssW+"px";c.style.height=cssH+"px";
  const ctx=c.getContext("2d");ctx.scale(DPR,DPR);
  return ctx;
}

function drawLineArea(ctx,xP,yP,vals,color,fill=true){
  if(vals.length<2)return;
  if(fill){
    const n=vals.length;
    ctx.beginPath();ctx.moveTo(xP(0),yP(vals[0]));
    for(let i=1;i<n;i++)ctx.lineTo(xP(i),yP(vals[i]));
    // find zero Y
    const yZero=yP(0);
    ctx.lineTo(xP(n-1),yZero);ctx.lineTo(xP(0),yZero);ctx.closePath();
    const cH=ctx.canvas.height/DPR;
    const g=ctx.createLinearGradient(0,0,0,cH);
    g.addColorStop(0,color+"28");g.addColorStop(1,color+"00");
    ctx.fillStyle=g;ctx.fill();
  }
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.moveTo(xP(0),yP(vals[0]));
  for(let i=1;i<vals.length;i++)ctx.lineTo(xP(i),yP(vals[i]));
  ctx.stroke();
}

// Gráfico simples (1 eixo, 1 linha) + overlay opcional nos 2 eixos Y
function drawChartWithOverlay(id, data, key, fmtY, refVal, refLabel, overlayInv, overlayCpv, cssW, cssH){
  const ctx=initCanvas(id,cssW,cssH);if(!ctx)return;
  const P={t:12,r:overlayInv||overlayCpv?52:12,b:26,l:52};
  const cW=cssW-P.l-P.r, cH=cssH-P.t-P.b;

  const vals=data.map(d=>+(d[key])||0);
  const invVals=data.map(d=>d.spend||0);
  const cpvVals=data.map(d=>d.cpv||0);

  // Domínio eixo Y esquerda (métrica principal)
  let allL=[...vals];if(refVal!=null)allL.push(refVal);
  const lMax=Math.max(...allL,0.01)*1.2, lMin=0;
  // Domínio eixo Y direita (overlay)
  const rVals=overlayCpv?cpvVals:invVals;
  const rMax=overlayInv||overlayCpv?Math.max(...rVals,0.01)*1.2:1;

  const xP=i=>P.l+(data.length>1?i/(data.length-1):0.5)*cW;
  const yPL=v=>P.t+cH-((v-lMin)/(lMax-lMin))*cH;
  const yPR=v=>P.t+cH-((v-0)/(rMax-0))*cH;

  // Grid + eixo Y esquerda
  ctx.setLineDash([]);
  for(let i=0;i<=4;i++){
    const y=P.t+(i/4)*cH;
    ctx.strokeStyle=GRID_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
    const lv=lMax-(i/4)*(lMax-lMin);
    ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="right";
    ctx.fillText(fmtY(lv),P.l-4,y+3);
  }

  // Eixo Y direita se overlay ativo
  if(overlayInv||overlayCpv){
    const ovColor=overlayInv?CHART_INV:CHART_CPV;
    const ovFmt=overlayInv?fBRLShort:v=>"R$"+v.toFixed(2);
    for(let i=0;i<=4;i++){
      const rv=rMax-(i/4)*(rMax-0);
      const y=P.t+(i/4)*cH;
      ctx.fillStyle=ovColor;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="left";
      ctx.fillText(ovFmt(rv),P.l+cW+4,y+3);
    }
  }

  // Linha de referência
  if(refVal!=null){
    const ry=yPL(refVal);
    ctx.strokeStyle=CHART_COLOR+"55";ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(P.l,ry);ctx.lineTo(P.l+cW,ry);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=CHART_COLOR;ctx.font="8px 'Inter',sans-serif";ctx.textAlign="right";
    ctx.fillText(refLabel||"Meta",P.l+cW,ry-3);
  }

  // Linha principal
  drawLineArea(ctx,xP,yPL,vals,CHART_COLOR,true);

  // Overlay
  if(overlayInv) drawLineArea(ctx,xP,yPR,invVals,CHART_INV,false);
  if(overlayCpv) drawLineArea(ctx,xP,yPR,cpvVals,CHART_CPV,false);

  // X labels
  const step=data.length>60?7:data.length>30?3:data.length>14?2:1;
  ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="center";ctx.setLineDash([]);
  data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.label,xP(i),P.t+cH+18);});
}

// Gráfico dual-axis (investimento x CPV)
function drawDual(id,data,cssW,cssH){
  const ctx=initCanvas(id,cssW,cssH);if(!ctx)return;
  const P={t:14,r:52,b:28,l:58};
  const cW=cssW-P.l-P.r,cH=cssH-P.t-P.b;
  const lVals=data.map(d=>d.spend||0);
  const rVals=data.map(d=>d.cpv||0);
  const lMax=Math.max(...lVals,0.01)*1.15;
  const rMax=Math.max(...rVals,META_CPV,0.01)*1.4;
  const xP=i=>P.l+(data.length>1?i/(data.length-1):0.5)*cW;
  const yPL=v=>P.t+cH-((v-0)/(lMax-0))*cH;
  const yPR=v=>P.t+cH-((v-0)/(rMax-0))*cH;
  ctx.setLineDash([]);
  for(let i=0;i<=4;i++){
    const y=P.t+(i/4)*cH;
    ctx.strokeStyle=GRID_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
    ctx.fillStyle=TICK_C;ctx.font="10px 'DM Mono',monospace";
    ctx.textAlign="right";ctx.fillText(fBRLShort(lMax-(i/4)*lMax),P.l-5,y+3.5);
    ctx.textAlign="left";ctx.fillText("R$"+(rMax-(i/4)*rMax).toFixed(0),P.l+cW+5,y+3.5);
  }
  const mY=yPR(META_CPV);
  ctx.strokeStyle=CHART_CPV+"55";ctx.lineWidth=1;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(P.l,mY);ctx.lineTo(P.l+cW,mY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=CHART_CPV;ctx.font="9px 'Inter',sans-serif";ctx.textAlign="left";
  ctx.fillText("Meta R$10",P.l+cW+4,mY-3);
  drawLineArea(ctx,xP,yPL,lVals,CHART_INV,true);
  drawLineArea(ctx,xP,yPR,rVals,CHART_CPV,false);
  const step=data.length>60?7:data.length>30?3:data.length>14?2:1;
  ctx.fillStyle=TICK_C;ctx.font="10px 'DM Mono',monospace";ctx.textAlign="center";ctx.setLineDash([]);
  data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.label,xP(i),P.t+cH+18);});
}

// Tooltip genérico
function setupTip(cid,tid,data,lines,padL=58,padR=12){
  const c=document.getElementById(cid),t=document.getElementById(tid);
  if(!c||!t)return;
  c.addEventListener("mousemove",e=>{
    const rect=c.getBoundingClientRect();
    const relX=(e.clientX-rect.left)-padL;
    const cW=rect.width-padL-padR;
    if(relX<0||relX>cW||!data.length){t.style.display="none";return;}
    const d=data[Math.max(0,Math.min(Math.round((relX/cW)*(data.length-1)),data.length-1))];
    let h=`<div class="tl">${d.label||d.date}</div>`;
    lines.forEach(l=>{
      h+=`<div class="tr"><span style="color:${l.color}">${l.name}</span><span class="tv">${(l.fmt||fBRL)(+(d[l.key])||0)}</span></div>`;
    });
    t.innerHTML=h;t.style.display="block";
    const tw=t.offsetWidth,x=e.clientX-rect.left;
    t.style.left=(x+12+tw>rect.width-8?x-tw-12:x+12)+"px";
    t.style.top=(e.clientY-rect.top-20)+"px";
  });
  c.addEventListener("mouseleave",()=>t.style.display="none");
}

// ── Render Anúncios ────────────────────────────────────────────────────────
function renderAnuncios(){
  const el=document.getElementById("page-anuncios");if(!el)return;

  // Constrói tabela de anúncios no período selecionado
  // Para cada advCode, soma invest da base Meta e vendas da base Vendas
  // cruzando pelo Ad ID
  function buildAdRows(start,end){
    const dd=D();
    const currentFunil=S.currentFunil;
    const principalId=currentFunil==="mapa"?"mapa":"manual";

    // Passo 0: mapa de identidades unificado (email + cpf + tel → chave canônica)
    // Garante que o mesmo comprador é reconhecido mesmo usando campos diferentes em compras distintas
    const identMap=new Map();
    function getIdKeys(r){
      const ks=[];
      const em=(r["Email"]||"").toLowerCase().trim();
      const cpf=(r["CPF Comprador"]||"").replace(/[^\d]/g,"");
      const tel=(r["Telefone"]||"").replace(/[^\d]/g,"");
      if(em)  ks.push("e:"+em);
      if(cpf) ks.push("c:"+cpf);
      if(tel) ks.push("t:"+tel);
      return ks;
    }
    for(const r of dd.funilRows){
      const ks=getIdKeys(r); if(!ks.length) continue;
      let canonical=null;
      for(const k of ks){ if(identMap.has(k)){canonical=identMap.get(k);break;} }
      if(!canonical) canonical=ks[0];
      for(const k of ks) identMap.set(k,canonical);
    }
    function getCanonical(r){
      const ks=getIdKeys(r);
      for(const k of ks){ if(identMap.has(k)) return identMap.get(k); }
      return ks[0]||null;
    }

    // Passo A: adId → Set de eventos de compra (canonical+data) do produto principal
    // Usa chave canonical+data (igual ao dedup de vendasByAdDate) para alinhar os dois lados
    const adBuyersMap=new Map();  // adId → Set de eventKeys ("canonical|date")
    for(const r of dd.funilRows){
      const dt=toISO(r["Data da compra"]||"")||"";
      if(dt<start||dt>end) continue;
      if((r["Status da compra"]||"").trim()!=="Paga") continue;
      if(classifyProduct(r["Nome do produto"]||"",currentFunil)!==principalId) continue;
      const adId=extractAdId(r["Ad Id"]||""); if(!adId) continue;
      const key=getCanonical(r); if(!key) continue;
      const eventKey=key+"|"+dt;
      if(!adBuyersMap.has(adId)) adBuyersMap.set(adId,new Set());
      adBuyersMap.get(adId).add(eventKey);
    }

    // Passo B: evento (canonical+data) → totalGasto naquele dia (todos os produtos Paga)
    const eventTotalSpent=new Map();
    for(const r of dd.funilRows){
      const dt=toISO(r["Data da compra"]||"")||"";
      if(dt<start||dt>end) continue;
      if((r["Status da compra"]||"").trim()!=="Paga") continue;
      const key=getCanonical(r); if(!key) continue;
      const eventKey=key+"|"+dt;
      const val=parseBRL(r["Valor do produto"]||"0");
      eventTotalSpent.set(eventKey,(eventTotalSpent.get(eventKey)||0)+val);
    }

    const rows=[];
    for(const [advCode,meta] of Object.entries(dd.metaByAd)){
      const byDate=dd.metaByAdByDate[advCode]||{};
      let spend=0,clicks=0,impressions=0;
      let igUrl="";
      const adIdsInPeriod=new Set();
      for(const [d,vals] of Object.entries(byDate)){
        if(d>=start && d<=end){
          spend+=vals.spend; clicks+=vals.clicks; impressions+=vals.impressions;
          vals.adIds.forEach(id=>adIdsInPeriod.add(id));
          if(!igUrl && vals.igUrl) igUrl=vals.igUrl;
        }
      }
      if(spend===0) continue;
      let qtd=0,valor=0,taxa=0;
      const useIds=adIdsInPeriod.size>0?adIdsInPeriod:meta.adIds;
      for(const adId of useIds){
        const byD=dd.vendasByAdDate[adId]||{};
        for(const [vd,vvals] of Object.entries(byD)){
          if(vd>=start && vd<=end){ qtd+=vvals.qtd; valor+=vvals.valor; taxa+=vvals.taxa; }
        }
      }
      if(!igUrl) igUrl=meta.igUrl;

      // Ticket Médio Ascensões: soma gasto de cada evento de compra atribuído a este ad
      let totalAscensoes=0;
      for(const adId of useIds){
        for(const eventKey of (adBuyersMap.get(adId)||new Set())){
          totalAscensoes+=(eventTotalSpent.get(eventKey)||0);
        }
      }

      const cpc=clicks>0?spend/clicks:0;
      const ctr=impressions>0?(clicks/impressions)*100:0;
      const cpm=impressions>0?(spend/impressions)*1000:0;
      const cpv=qtd>0?spend/qtd:0;
      const ticket=qtd>0?valor/qtd:0;
      const ticketAsc=qtd>0?totalAscensoes/qtd:0;
      rows.push({advCode,spend,clicks,impressions,qtd,valor,cpc,ctr,cpm,cpv,ticket,ticketAsc,igUrl});
    }
    return rows.filter(r=>r.spend>0);
  }

  const rows=buildAdRows(S.aStartDate,S.aEndDate);

  // Totais do período (usa dados diários já calculados)
  const dailyA=[];
  const _da=D();
  const allDates=new Set([...Object.keys(_da.meta),...Object.keys(_da.vendas)]);
  for(const d of Array.from(allDates).sort()){
    if(d<S.aStartDate||d>S.aEndDate) continue;
    const m=_da.meta[d]||{spend:0,clicks:0,impressions:0};
    const v=_da.vendas[d]||{qtd:0,valor:0};
    dailyA.push({spend:m.spend,clicks:m.clicks,impressions:m.impressions,qtd:v.qtd,valor:v.valor});
  }
  const tot=dailyA.reduce((a,d)=>({
    spend:a.spend+d.spend,clicks:a.clicks+d.clicks,
    impressions:a.impressions+d.impressions,qtd:a.qtd+d.qtd,valor:a.valor+d.valor
  }),{spend:0,clicks:0,impressions:0,qtd:0,valor:0});
  const totCpc=tot.clicks>0?tot.spend/tot.clicks:0;
  const totCtr=tot.impressions>0?(tot.clicks/tot.impressions)*100:0;
  const totCpm=tot.impressions>0?(tot.spend/tot.impressions)*1000:0;
  const totCpv=tot.qtd>0?tot.spend/tot.qtd:0;
  const totTicket=tot.qtd>0?tot.valor/tot.qtd:0;
  const rowsQtd=rows.reduce((a,r)=>a+r.qtd,0);
  // totTicketAsc = LTV: gasto total / compradores únicos do produto principal (= buildFunilData.ltv)
  // Usa mesma lógica de dedup que buildFunilData (identity+data) para incluir todos os compradores,
  // mesmo os sem adId, e inclui planLucro/Curso comprados em dias diferentes
  {
    const _dd=D();
    const _pId=S.currentFunil==="mapa"?"mapa":"manual";
    const _bSpent=new Map(); // identity → total gasto no período
    const _bPrinc=new Set(); // identities que compraram o produto principal
    for(const r of _dd.funilRows){
      const dt=toISO(r["Data da compra"]||"")||"";
      if(dt<S.aStartDate||dt>S.aEndDate) continue;
      if((r["Status da compra"]||"").trim()!=="Paga") continue;
      const em=(r["Email"]||"").toLowerCase().trim();

      const val=parseBRL(r["Valor do produto"]||"0");
      _bSpent.set(id,(_bSpent.get(id)||0)+val);
      if(classifyProduct(r["Nome do produto"]||"",_pId)===_pId) _bPrinc.add(id);
    }
    let _fat=0; for(const k of _bPrinc) _fat+=(_bSpent.get(k)||0);
    var totTicketAsc=_bPrinc.size>0?_fat/_bPrinc.size:0;
  }

  // Ordenação
  const {col,dir}=S.aSort;
  const sorted=[...rows].sort((a,b)=>{
    const av=a[col]??0, bv=b[col]??0;
    if(typeof av==="string") return dir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    return dir==="asc"?av-bv:bv-av;
  });

  function thSort(c,lbl){

    const arrow=active?(dir==="asc"?" ↑":" ↓"):" ↕";
    return `<th onclick="sortAnuncios('${c}')" style="padding:10px 14px;text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:${active?"var(--text-strong)":"#7a6c5e"};cursor:pointer;user-select:none;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap">${lbl}<span style="color:${active?"#e8621a":"#d8cfc3"};font-size:10px;margin-left:3px">${arrow}</span></th>`;
  }

  function sc(v,meta,hi){return statusColor(v,meta,hi);}

  function thRow(c,lbl){

      <div class="kc" style="border-color:${statusBorder(totTicket,META_TICKET,true)}"><div class="kc-lbl">Ticket Médio Front</div><div class="kc-val" style="color:${sc(totTicket,META_TICKET,true)};font-size:18px">${fBRL(totTicket)}</div><div class="kc-sub">meta ${fBRL(META_TICKET)}</div></div>

// ── Helper: dados do funil ativo ──────────────────────────────────────────
// Retorna o namespace de dados correto (S ou S.mapa) dependendo do funil ativo
function D(){ return S.currentFunil==="mapa" ? S.mapa : S; }

// ── Funil helpers ──────────────────────────────────────────────────────────
function classifyProduct(name, funil){
  if(!name) return null;
  const n=name.toUpperCase();
  const f=funil||S.currentFunil;

  // Gratuitos → sempre ignorar
  if(n.includes("GRÁTIS") || n.includes("GRATIS")) return null;

  // OBs do PlanLucro — IDs próprios, verificar ANTES dos filtros genéricos
  if(n.includes("10 ERROS")) return "ob10Erros";
  if(n.includes("REDUZIR")) return "obReduzir";
  if(n.includes("REPROVADO")) return "obReprovado";
  if(n.includes("CUSTO POR M2")) return "obCustoM2";
  if(n.includes("APROVAÇÃO DO PROJETO") || n.includes("APROVACAO DO PROJETO")) return "obAprovacao";

  if(f==="mapa"){
    const IGNORAR_MAPA=["MANUAL DEFINITIVO","RAIO-X","RAIOX","IMPOSTO",
      "PILARES","DESCUBRA O CUSTO","QUAL O LUCRO",
      "OS 8 PILARES","MÉTODO ALAVANCA","METODO ALAVANCA","EBOOK - DESCUBRA"];
    if(IGNORAR_MAPA.some(x=>n.includes(x))) return null;
    if(n.includes("MAPA DA CASA")) return "mapa";
    if(n.includes("GUIA DEFINITIVO") || (n.includes("CAIXA") && n.includes("PASSO"))) return "guiaCaixa";
    if(n.includes("CHECKLIST")) return "checklist";
    if(n.includes("LUCRO")) return "planLucro";
    if(n.includes("CURSO COMPLETO") || n.includes("PASSO A PASSO")) return "curso";
    return null;
  }

  // funil manual
  const IGNORAR=["MAPA DA CASA","RAIO-X","RAIOX","GUIA DEFINITIVO","IMPOSTO",
    "PILARES","ZERO ENTRADA","CASA PRÓPRIA","CASA PROPRIA",
    "DESCUBRA O CUSTO","DOIS CHECKLISTS","QUAL O LUCRO","OS 8 PILARES",
    "MÉTODO ALAVANCA","METODO ALAVANCA","EBOOK - DESCUBRA"];
  if(IGNORAR.some(x=>n.includes(x))) return null;
  if(n.includes("MANUAL DEFINITIVO")) return "manual";
  if(n.includes("CHECKLIST")) return "checklist";
  if((n.includes("FINANCIAMENTO") || n.includes("CUSTOS DO FINANCIAMENTO")) && !n.includes("CAIXA")) return "planFin";
  if(n.includes("LUCRO")) return "planLucro";
  if(n.includes("CURSO COMPLETO") || n.includes("PASSO A PASSO")) return "curso";
  return null;
}

function getFunilSteps(funil){
  const f=funil||S.currentFunil;

}


// Expande linhas da Base Vendas - Completo
// Formato antigo: 1 linha = 1 produto
// Formato novo: 1 linha pode ter produto principal + OB1 + OB2 na mesma linha
// Upsell e Curso continuam em linhas separadas em ambos os formatos
function expandFunilRows(rawRows, funil){
  // funil opcional: se informado, só expande linhas que pertencem a esse funil
  // (evita que linhas do Manual entrem no funil do Mapa e vice-versa)
  const f=funil||null;
  const out=[];
  for(const r of rawRows){
    if(!r["Nome do produto principal"] && !r["Data da compra"]) continue;
    const st=normalizeStatus(r["Status da compra"]);
    if(!st) continue;

    // Se funil informado, verifica se a transação pertence a ele
    if(f){
      const nomePrincipal=(r["Nome do produto principal"]||"").toUpperCase();
      const nOB1=(r["Nome do orderbump 01"]||"").toUpperCase();
      const nOB2=(r["Nome do orderbump 02"]||"").toUpperCase();
      // Compras standalone de ascensão (planLucro, curso) não têm o produto principal do funil
      // mas precisam ser incluídas para que buildFunilData possa contá-las no Passo 2
      const principalId=classifyProduct(r["Nome do produto principal"]||"",f);
      const STANDALONE_IDS=new Set(["planLucro","curso","ob10Erros","obReduzir","obReprovado","obCustoM2","obAprovacao"]);
      const isStandaloneAscension=STANDALONE_IDS.has(principalId);
      if(f==="mapa"){
        // Pertence ao Mapa se Mapa aparece em qualquer campo, OU se é ascensão standalone
        const ehMapa=nomePrincipal.includes("MAPA DA CASA")||nOB1.includes("MAPA DA CASA")||nOB2.includes("MAPA DA CASA");
        if(!ehMapa && !isStandaloneAscension) continue;
      } else {
        // Manual: produto principal deve ser o Manual, OU é ascensão standalone
        if(!nomePrincipal.includes("MANUAL DEFINITIVO") && !isStandaloneAscension) continue;
      }
    }

    const dataBruta=stripTime(r["Data da compra"]||"");
    const adIdRaw=r["Ad Id"]||r["Content"]||"";
    const base={
      "Email":r["Email"]||"",
      "CPF Comprador":r["CPF Comprador"]||"",
      "Telefone":r["Telefone"]||"",
      "Nome":r["Nome"]||"",
      "Status da compra":st,
      "Data da compra":dataBruta,
      "Ad Id":adIdRaw,
    };
    if(r["Nome do produto principal"]){
      out.push({...base,
        "Nome do produto":r["Nome do produto principal"],
        "Valor do produto":r["Valor do produto principal"]||r["Valor do produto"]||"0",
        "Taxa da plataforma":r["Taxa da plataforma"]||"0",
      });
    }
    if(r["Nome do orderbump 01"]){
      out.push({...base,
        "Nome do produto":r["Nome do orderbump 01"],
        "Valor do produto":r["Valor order bump 01"]||"0",
        "Taxa da plataforma":"0",
      });
    }
    if(r["Nome do orderbump 02"]){
      out.push({...base,
        "Nome do produto":r["Nome do orderbump 02"],
        "Valor do produto":r["Valor order bump 02"]||"0",
        "Taxa da plataforma":"0",
      });
    }
  }
  return out;
}

// Deduplicação de eventos webhook:
// Mesma pessoa + mesmo produto + dentro de 7 dias → mantém o mais recente por data/hora
// Se data/hora igual → hierarquia: Reembolsado > Aguardando Reembolso > Paga > Em Recuperacao > Expirado > outros
function deduplicateFunilRows(rows){
  const STATUS_PRIORITY={"Reembolsado":6,"Aguardando Reembolso":5,"Paga":4,"Em Recuperacao":3,"Expirado":2,"Aberta":1,"":0};
  function sp(st){ return STATUS_PRIORITY[st]||0; }

  // Chave: email+cpf+tel+produto+janela7dias
  // Agrupa por chave e mantém o de maior prioridade/data
  const groups=new Map();
  for(const r of rows){
    const em=(r["Email"]||"").toLowerCase().trim();
    const cpf=(r["CPF Comprador"]||"").replace(/[^\d]/g,"");
    const tel=(r["Telefone"]||"").replace(/[^\d]/g,"");
    const prod=(r["Nome do produto"]||"").trim().toUpperCase();
    const dataBruta=r["Data da compra"]||"";
    const dateStr=toISO(dataBruta)||"";
    const identity=em||cpf||tel;
    if(!identity||!prod||!dateStr) { /* sem chave — adiciona direto */ groups.set(Math.random().toString(),r); continue; }

    // Encontra grupo existente com mesma identidade + produto dentro de 7 dias
    let found=null;
    for(const [k,g] of groups){
      if(!g._identity||!g._prod) continue;
      if(g._prod!==prod) continue;
      // verifica identidade
      const gEm=(g["Email"]||"").toLowerCase().trim();
      const gCpf=(g["CPF Comprador"]||"").replace(/[^\d]/g,"");
      const gTel=(g["Telefone"]||"").replace(/[^\d]/g,"");
      const identMatch=(em&&gEm&&em===gEm)||(cpf&&gCpf&&cpf===gCpf)||(tel&&gTel&&tel===gTel);
      if(!identMatch) continue;
      // verifica janela 7 dias
      const d1=new Date((g._dateStr||"")+"T12:00:00Z");
      const d2=new Date(dateStr+"T12:00:00Z");
      const diffDays=Math.abs((d2-d1)/(86400000));
      if(diffDays<=7){ found=k; break; }
    }

    const rWithMeta={...r,_identity:identity,_prod:prod,_dateStr:dateStr};
    if(found){
      const existing=groups.get(found);
      // Mantém o mais recente; se empate, maior prioridade de status
      const existDate=existing._dateStr||"";
      const newDate=dateStr;
      const existSP=sp(existing["Status da compra"]||"");
      const newSP=sp(r["Status da compra"]||"");
      if(newDate>existDate||(newDate===existDate&&newSP>existSP)){
        groups.set(found,rWithMeta);
      }
    } else {
      groups.set(Math.random().toString(),rWithMeta);
    }
  }
  return Array.from(groups.values());
}

function buildFunilData(rows, start, end, funil){
  const f=funil||S.currentFunil;
  const primaryId=f==="mapa"?"mapa":"manual"; // produto de entrada do funil
  // filtered: só para análise de status/perdas — respeita período
  const filtered = rows.filter(r=>{
    if(!start && !end) return true;
    const d = toISO(r["Data da compra"]||r["Data"]);
    if(!d) return true;
    if(start && d<start) return false;
    if(end   && d>end)   return false;
    return true;
  });

  // Para buyers: usa TODAS as linhas (sem filtro de período)
  // O período só controla se a compra entra nos totais, não quem é o comprador
  const allRows = rows;

  // Agrupa por comprador (e-mail + cpf + telefone)
  // Identifica o comprador único
  function buyerKey(r){
    // Retorna chaves únicas: cada campo é prefixado para evitar colisão entre email/cpf/tel
    const keys=[];
    const em=(r["Email"]||"").toLowerCase().trim();
    const cpf=(r["CPF Comprador"]||"").replace(/[^\d]/g,"");
    const tel=(r["Telefone"]||"").replace(/[^\d]/g,"");
    if(em)  keys.push("e:"+em);
    if(cpf) keys.push("c:"+cpf);
    if(tel) keys.push("t:"+tel);
    return keys;
  }

  // Mapeia comprador -> conjunto de produtos comprados com data
  // Estrutura: {keys: Set, products: [{id, date, valor, status}]}
  const buyers = new Map(); // normalizedKey -> buyer obj

  function getOrCreate(r){
    const keys = buyerKey(r);
    // procura buyer existente que compartilhe pelo menos 1 chave
    for(const [k,b] of buyers){
      for(const key of keys){
        if(key && b.keys.has(key)){
          // adiciona as novas keys a esse buyer
          keys.forEach(k2=>{ if(k2) b.keys.add(k2); });
          return b;
        }
      }
    }
    // novo buyer
    const b={keys:new Set(keys.filter(Boolean)), products:[]};
    const mapKey = keys[0] || Math.random().toString();
    buyers.set(mapKey, b);
    return b;
  }

  for(const r of allRows){
    const prodId = classifyProduct(r["Nome do produto"],f);
    if(!prodId) continue;
    const buyer = getOrCreate(r);
    const d = toISO(r["Data da compra"]||r["Data"]) || "";
    const status = normalizeStatus((r["Status da compra"]||"").trim());
    const valor  = parseBRL(r["Valor do produto"]);
    const taxa   = parseBRLAbs(r["Taxa da plataforma"]);
    buyer.products.push({id:prodId, date:d, status, valor, taxa});
  }

  // Conta: só conta produtos comprados APÓS a primeira compra do manual (status Paga)
  const counts = {};
  const fat    = {};
  const taxa   = {};
  getFunilSteps(f).forEach(s=>{ counts[s.id]=0; fat[s.id]=0; taxa[s.id]=0; });

  // Status analysis
  const statusCounts = {};
  const statusVals   = {};
  const statusByProd = {};
  getFunilSteps(f).forEach(s=>{ statusByProd[s.id]={}; });

  // All rows for status analysis (sem filtro de funil)
  for(const r of filtered){
    const prodId=classifyProduct(r["Nome do produto"],f);
    if(!prodId) continue;
    const st=normalizeStatus((r["Status da compra"]||"").trim());
    const val=parseBRL(r["Valor do produto"]);
    statusCounts[st]=(statusCounts[st]||0)+1;
    statusVals[st]=(statusVals[st]||0)+val;
    if(!statusByProd[prodId]) statusByProd[prodId]={};
    statusByProd[prodId][st]=(statusByProd[prodId][st]||0)+1;
  }

  // Funil: só Paga, dentro do período
  // OBs de faturamento (produto principal + OBs diretos)
  const OB_FAT_IDS = f==="mapa"
    ? new Set(["mapa","guiaCaixa","checklist"])
    : new Set(["manual","checklist","planFin"]);

  // Passo 1: agrupa por comprador+data para calcular faturamento do produto principal
  // (evita duplicatas entre webhook e histórica)
  {
    const ST_PRI={"Reembolsado":6,"Aguardando Reembolso":5,"Paga":4,"Em Recuperacao":3,"Expirado":2,"Aberta":1,"":0};
    const grupos=new Map();
    for(const r of filtered){
      const prodId=classifyProduct(r["Nome do produto"],f);
      if(!OB_FAT_IDS.has(prodId)) continue; // só produto principal + OBs diretos aqui
      const st=normalizeStatus((r["Status da compra"]||"").trim());
      if(!st) continue;
      const d=toISO(r["Data da compra"]||r["Data"])||"";
      const em=(r["Email"]||"").toLowerCase().trim();
      const cpf=(r["CPF Comprador"]||"").replace(/[^\d]/g,"");
      const tel=(r["Telefone"]||"").replace(/[^\d]/g,"");
      const identity=em||cpf||tel; if(!identity) continue;
      const key=identity+"|"+d;
      if(!grupos.has(key)) grupos.set(key,{st,d,valor:0,taxa:0,hasPrimary:false,obCounts:{}});
      const g=grupos.get(key);
      if((ST_PRI[st]||0)>(ST_PRI[g.st]||0)) g.st=st;
      if(prodId===primaryId) g.hasPrimary=true;
      if(st==="Paga"){
        g.valor += parseBRL(r["Valor do produto"]);
        g.taxa  += parseBRLAbs(r["Taxa da plataforma"]);
        // Conta cada OB individualmente dentro do grupo
        if(prodId!==primaryId) g.obCounts[prodId]=(g.obCounts[prodId]||0)+1;
      }
    }
    for(const [,g] of grupos){
      if(!g.hasPrimary || g.st!=="Paga") continue;
      counts[primaryId]++;
      fat[primaryId] += g.valor;
      taxa[primaryId]+= g.taxa;
      // Contagem dos OBs desta transação
      for(const [obId, obQtd] of Object.entries(g.obCounts)){
        counts[obId]=(counts[obId]||0)+obQtd;
      }
    }
  }

  // Passo 2: upsell e ascensão (planLucro, curso) — por comprador, após produto principal
  for(const [,buyer] of buyers){
    const paid = buyer.products.filter(p=>p.status==="Paga");
    const mainPurchases = paid.filter(p=>p.id===primaryId).sort((a,b)=>a.date.localeCompare(b.date));
    if(!mainPurchases.length) continue;
    const mainDate = mainPurchases[0].date;
    const others = paid.filter(p=>{
      if(OB_FAT_IDS.has(p.id)) return false; // OBs já contados acima
      if(p.date < mainDate) return false;
      if(start && p.date < start) return false;
      if(end   && p.date > end)   return false;
      return true;
    });
    for(const p of others){
      counts[p.id]=(counts[p.id]||0)+1;
      fat[p.id]=(fat[p.id]||0)+p.valor;
      taxa[p.id]=(taxa[p.id]||0)+(p.taxa||0);
    }
  }

  const manualCount = counts[primaryId] || 1;
  const totalFat  = Object.values(fat).reduce((a,b)=>a+b,0);
  // Taxa Eduzz: inclui Paga + Reembolsado + Aguardando Reembolso
  // (Eduzz cobra taxa mesmo em reembolsos)
  const totalTaxaPaga = Object.values(taxa).reduce((a,b)=>a+b,0);
  let totalTaxaReemb = 0;
  for(const r of filtered){
    const st=normalizeStatus((r["Status da compra"]||"").trim());
    if(st!=="Reembolsado" && st!=="Aguardando Reembolso") continue;
    const prodId=classifyProduct(r["Nome do produto"],f);
    if(!prodId) continue;
    totalTaxaReemb += parseBRLAbs(r["Taxa da plataforma"]);
  }
  const totalTaxa = totalTaxaPaga + totalTaxaReemb;

  // Spend no período (da base Meta do funil ativo)
  let totalSpend=0;
  const _metaD=f==="mapa"?S.mapa.meta:S.meta;
  for(const d of Object.keys(_metaD)){
    if(start && d<start) continue;
    if(end   && d>end)   continue;
    totalSpend+=_metaD[d].spend||0;
  }

  return {
    counts, fat, manualCount, totalFat, totalSpend, buyers,
    roas: totalSpend>0 ? totalFat/totalSpend : 0,
    ltv:  totalFat/manualCount,
    lucro: totalFat - totalTaxa - (totalSpend*TAXA_IMPOSTO),
    taxaAscensao: (function(){
      if(!manualCount) return 0;
      let cnt=0;
      for(const [,buyer] of buyers){
        const paid=buyer.products.filter(p=>p.status==="Paga");
        const mp=paid.filter(p=>p.id===primaryId).sort((a,b)=>a.date.localeCompare(b.date))[0];
        if(!mp) continue;
        const ascendeu=paid.some(p=>(p.id==="planLucro"||p.id==="curso")&&p.date>=mp.date);
        if(ascendeu) cnt++;
      }
      return (cnt/manualCount)*100;
    })(),
    statusCounts, statusVals, statusByProd, buyers,
  };
}

// ── buildGeralData — Funil Consolidado (Manual + Mapa) ────────────────────
function buildGeralData(rows, start, end){
  // Mapa de compradores: chave → {keys, firstManual, firstMapa, products}
  const buyersMap=new Map();

  function getOrCreateG(em,cpf,tel){
    const ids=[];
    if(em)  ids.push("e:"+em);
    if(cpf) ids.push("c:"+cpf);
    if(tel) ids.push("t:"+tel);
    if(!ids.length) return null;
    let found=null;
    for(const id of ids){ if(buyersMap.has(id)){found=buyersMap.get(id);break;} }
    if(!found){
      found={keys:new Set(ids),firstManual:null,firstMapa:null,products:[]};
      for(const id of ids) buyersMap.set(id,found);
    } else {
      for(const id of ids){ buyersMap.set(id,found); found.keys.add(id); }
    }
    return found;
  }

  // Passo 1: percorre TODAS as linhas (sem filtro de período)
  // → garante que firstManual/firstMapa reflitam histórico completo
  for(const r of rows){
    const em=(r["Email"]||"").toLowerCase().trim();
    const cpf=(r["CPF Comprador"]||"").replace(/[^\d]/g,"");
    const tel=(r["Telefone"]||"").replace(/[^\d]/g,"");
    if(!em&&!cpf&&!tel) continue;
    const st=(r["Status da compra"]||"").trim();
    if(st!=="Paga") continue;
    const name=(r["Nome do produto"]||"").toUpperCase();
    const gf=r._gf;
    let prodId=gf?classifyProduct(name,gf):null;
    if(!prodId) prodId=classifyProduct(name,"manual")||classifyProduct(name,"mapa");
    if(!prodId) continue;
    const b=getOrCreateG(em,cpf,tel); if(!b) continue;
    const dt=toISO(r["Data da compra"]||"")||"";
    if(prodId==="manual" && (!b.firstManual||dt<b.firstManual)) b.firstManual=dt;
    if(prodId==="mapa"   && (!b.firstMapa ||dt<b.firstMapa  )) b.firstMapa=dt;
    b.products.push({id:prodId,date:dt,status:st,val:parseBRL(r["Valor do produto"]||"0")});
  }

  // Passo 2: conta por produto no período
  const counts={manual:0,mapa:0,checklist:0,planFin:0,guiaCaixa:0,planLucro:0,ob10Erros:0,obReduzir:0,obReprovado:0,obCustoM2:0,obAprovacao:0,curso:0};
  const fat   ={manual:0,mapa:0,checklist:0,planFin:0,guiaCaixa:0,planLucro:0,ob10Erros:0,obReduzir:0,obReprovado:0,obCustoM2:0,obAprovacao:0,curso:0};
  const statusCounts={}, statusVals={};
  let totalFat=0, totalTaxa=0;
  const buyerCountedForProd=new Map(); // bKey → Set(prodId) — evita contar o mesmo comprador 2x por produto
  const entryBuyerKeys=new Set();
  const ascensaoKeys=new Set();

  for(const r of rows){
    const dt=toISO(r["Data da compra"]||"")||"";
    if(start&&dt<start) continue;
    if(end  &&dt>end  ) continue;

    const st=(r["Status da compra"]||"").trim();
    statusCounts[st]=(statusCounts[st]||0)+1;
    const val=parseBRL(r["Valor do produto"]||"0");
    statusVals[st]=(statusVals[st]||0)+val;

    if(st!=="Paga") continue;

    const em=(r["Email"]||"").toLowerCase().trim();
    const cpf=(r["CPF Comprador"]||"").replace(/[^\d]/g,"");
    const tel=(r["Telefone"]||"").replace(/[^\d]/g,"");
    if(!em&&!cpf&&!tel) continue;
    const b=getOrCreateG(em,cpf,tel); if(!b) continue;
    const bKey=[...b.keys][0];

    const name=(r["Nome do produto"]||"").toUpperCase();
    const gf=r._gf;
    let prodId=gf?classifyProduct(name,gf):null;
    if(!prodId) prodId=classifyProduct(name,"manual")||classifyProduct(name,"mapa");
    if(!prodId) continue;

    const taxa=parseBRL(r["Taxa da plataforma"]||"0");
    totalFat+=val;
    totalTaxa+=taxa;

    // Conta cada comprador uma vez por produto (dedup comprador-nível)
    if(!buyerCountedForProd.has(bKey)) buyerCountedForProd.set(bKey,new Set());
    if(!buyerCountedForProd.get(bKey).has(prodId)){
      buyerCountedForProd.get(bKey).add(prodId);
      counts[prodId]=(counts[prodId]||0)+1;
      fat[prodId]=(fat[prodId]||0)+val;
    }

    if(prodId==="manual"||prodId==="mapa") entryBuyerKeys.add(bKey);

    if(prodId==="planLucro"||prodId==="curso"){
      const fe=b.firstManual&&b.firstMapa
        ?(b.firstManual<b.firstMapa?b.firstManual:b.firstMapa)
        :(b.firstManual||b.firstMapa);
      if(fe&&dt>=fe) ascensaoKeys.add(bKey);
    }
  }

  const entryCount=entryBuyerKeys.size;
  const ltv=entryCount>0?totalFat/entryCount:0;
  const taxaAscensao=entryCount>0?(ascensaoKeys.size/entryCount)*100:0;

  return {counts,fat,entryCount,totalFat,totalTaxa,ltv,taxaAscensao,
          ascensaoCount:ascensaoKeys.size,statusCounts,statusVals,buyers:buyersMap};
}

// ── Funil barras helper ────────────────────────────────────────────────────
function funilBarras(counts,fat,pct){
  const CORES={
    manual:"#3b82f6",checklist:"#34d399",planFin:"#2dd4bf",
    planLucro:"#fbbf24",curso:"#f87171",
    mapa:"#60a5fa",guiaCaixa:"#2dd4bf",
  };
  const steps=getFunilSteps().map(s=>({...s,color:CORES[s.id]||"#555"}));
  return steps.map(function(s){
    var p=pct(s.id);
    var barW=Math.max(p,0.5);
    var innerLabel=barW>8
      ? '<span style="font-size:11px;font-weight:600;color:#fff;white-space:nowrap">'+p.toFixed(1)+'%</span>'
      : '';
    var outerLabel=barW<=8
      ? '<span style="position:absolute;left:calc('+barW+'% + 6px);top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;color:var(--text);white-space:nowrap">'+p.toFixed(1)+'%</span>'
      : '';
    return '<div style="display:flex;align-items:center;gap:12px">'
      +'<div style="width:148px;flex-shrink:0">'
        +'<div style="font-size:11px;font-weight:600;color:var(--text)">'+s.label+'</div>'
        +'<div style="font-size:9px;color:var(--hint);margin-top:1px">'+s.step+'</div>'
      +'</div>'
      +'<div style="flex:1;height:28px;background:rgba(255,255,255,.05);border-radius:5px;overflow:visible;position:relative;border:1px solid var(--border)">'
        +'<div style="height:100%;width:'+barW+'%;background:'+s.color+';border-radius:4px;display:flex;align-items:center;padding-left:8px;min-width:2px;opacity:.85">'
          +innerLabel
        +'</div>'
        +outerLabel
      +'</div>'
      +'<div style="width:78px;flex-shrink:0;text-align:right">'
        +'<div style="font-size:13px;font-weight:600;color:var(--text);font-family:\'JetBrains Mono\',monospace">'+(counts[s.id]||0).toLocaleString("pt-BR")+'</div>'
        +'<div style="font-size:10px;color:var(--hint);font-family:\'JetBrains Mono\',monospace">'+fBRLShort(fat[s.id]||0)+'</div>'
      +'</div>'
    +'</div>';
  }).join("");
}

// ── Funil Pyramid ─────────────────────────────────────────────────────────
function funilPyramid(counts, manualCount, funil){
  const f=funil||S.currentFunil;
  const primaryKey=f==="mapa"?"mapa":"manual";
  const primaryCount=counts[primaryKey]||0;
  const obCount=(counts["checklist"]||0)+(f==="mapa"?(counts["guiaCaixa"]||0):(counts["planFin"]||0));
  const upsellCount=counts["planLucro"]||0;
  const ascCount=counts["curso"]||0;
  const N=manualCount||1;
  // Escala sqrt: comprime valores grandes, separa bem os pequenos entre si
  // MAX_H=120 para o principal (100%), min 10px para não sumir
  const MAX_H=120, MIN_H=10;
  function ph(pct){
    if(pct<=0) return MIN_H;
    return Math.max(MIN_H, Math.round(Math.sqrt(pct/100)*MAX_H));
  }
  const levels=[
    {label:"Produto principal",count:primaryCount,pct:100,
     grad:"linear-gradient(135deg,#2dd4bf,#14b8a6)",tc:"#06241f",clip:"0 0,100% 0,90% 100%,10% 100%"},
    {label:"Order bumps",count:obCount,pct:(obCount/N)*100,
     grad:"linear-gradient(135deg,#60a5fa,#2563eb)",tc:"#fff",clip:"10% 0,90% 0,77% 100%,23% 100%"},
    {label:"Upsell",count:upsellCount,pct:(upsellCount/N)*100,
     grad:"linear-gradient(135deg,#a78bfa,#7c3aed)",tc:"#fff",clip:"23% 0,77% 0,63% 100%,37% 100%"},
    {label:"Ascensão",count:ascCount,pct:(ascCount/N)*100,
     grad:"linear-gradient(135deg,#fbbf24,#f59e0b)",tc:"#1c0900",clip:"37% 0,63% 0,52% 100%,48% 100%"},
  ];
  return `<div style="display:flex;flex-direction:column;gap:3px">
    ${levels.map(l=>{
      const h=ph(l.pct);
      const small=h<28;
      return `
      <div style="position:relative;height:${h}px;clip-path:polygon(${l.clip});background:${l.grad};display:flex;align-items:center;justify-content:center;flex-direction:column;overflow:hidden">
        ${small
          ? `<div style="font-size:9px;font-weight:600;color:${l.tc};text-align:center;white-space:nowrap;line-height:1.2;text-shadow:0 1px 2px rgba(0,0,0,.4)">${l.label} · ${l.count.toLocaleString("pt-BR")} · ${l.pct.toFixed(1)}%</div>`
          : `<div style="font-size:10px;font-weight:600;color:${l.tc};text-align:center;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.3)">${l.label}</div>
             <div style="font-size:10px;color:${l.tc};opacity:.85;text-align:center;font-family:'JetBrains Mono',monospace">${l.count.toLocaleString("pt-BR")} · ${l.pct.toFixed(1)}%</div>`
        }
      </div>`;
    }).join("")}
  </div>`;
}

// ── Render Funil ────────────────────────────────────────────────────────────

    return;

  const fd = buildFunilData(_dd.funilRows, S.fStartDate||"", S.fEndDate||"");

  // proporcional às conversões do manual
  function pct(id){ return manualCount>0?((counts[id]||0)/manualCount)*100:0; }

  const roasC=statusColor(roas,META_ROAS,true);
  const lucroC=lucro>=0?"#34d399":"#f87171";

  // Status perdas
  const qtdReemb=(statusCounts["Reembolsado"]||0)+(statusCounts["Aguardando Reembolso"]||0);
  const valReemb=(statusVals["Reembolsado"]||0)+(statusVals["Aguardando Reembolso"]||0);
  const qtdRec  =statusCounts["Em Recuperacao"]||0;
  const valRec  =statusVals["Em Recuperacao"]||0;
  const qtdAbrt =(statusCounts["Aberta"]||0)+(statusCounts["Aguardando Pagamento"]||0);
  const valAbrt =(statusVals["Aberta"]||0)+(statusVals["Aguardando Pagamento"]||0);
  const pctReemb=totalFat>0?(valReemb/totalFat)*100:0;
  const pctRec  =totalFat>0?(valRec/totalFat)*100:0;
  const pctAbrt =totalFat>0?(valAbrt/totalFat)*100:0;

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:6px">
      <div>
        <div class="hdr-title">Métricas do Funil</div>
        <div class="hdr-sub">atualizado em: ${_dd.updated||"—"} · ${_dd.funilRows.length} linhas · base: ${manualCount.toLocaleString("pt-BR")} compradores do ${S.currentFunil==="mapa"?"Mapa":"Manual"}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:13px;margin-bottom:18px">
      <div class="kc"><div class="kc-lbl">Investimento</div><div class="kc-val" style="font-size:17px">${fBRL(totalSpend)}</div><div class="kc-sub">Meta Ads</div></div>
      <div class="kc"><div class="kc-lbl">Faturamento Total</div><div class="kc-val" style="font-size:17px">${fBRL(totalFat)}</div><div class="kc-sub">todos os produtos</div></div>
      <div class="kc" style="border-color:${statusBorder(roas,META_ROAS,true)}"><div class="kc-lbl">ROAS Funil</div><div class="kc-val" style="color:${roasC};font-size:17px">${roas.toFixed(2)}x</div><div class="kc-sub" style="color:${roasC}">▲ saudável</div></div>
      <div class="kc" style="border-color:${lucro>=0?"rgba(52,211,153,.22)":"rgba(248,113,113,.22)"}"><div class="kc-lbl">Lucro Bruto</div><div class="kc-val" style="color:${lucroC};font-size:17px">${fBRL(lucro)}</div><div class="kc-sub">após custos</div></div>
      <div class="kc"><div class="kc-lbl">LTV Médio</div><div class="kc-val" style="font-size:17px">${fBRL(ltv)}</div><div class="kc-sub">por comprador</div></div>
      <div class="kc"><div class="kc-lbl">Taxa de Ascensão</div><div class="kc-val" style="font-size:17px">${taxaAscensao.toFixed(1)}%</div><div class="kc-sub">compraram 2+ produtos</div></div>

      <div class="cc" style="padding:18px">

        <div style="display:flex;flex-direction:column;gap:10px">
          ${funilBarras(counts,fat,pct)}
        </div>
      </div>

      <!-- Pirâmide -->
      <div class="cc" style="padding:18px">
        <div class="section-lbl" style="margin-top:0;margin-bottom:14px">Funil de conversão</div>
        ${funilPyramid(counts,manualCount)}
      </div>
